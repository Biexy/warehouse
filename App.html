<script>
(function () {
  'use strict';

  var SESSION_KEY = 'warehouse-control.session-token.v1';
  var PAGE_SIZE = 25;
  var DASHBOARD_DEFAULT_DAYS = 30;
  var ITEM_PICKER_LIMIT = 12;
  var ROLE_LABELS = {
    ADMIN: 'مدير النظام',
    STOREKEEPER: 'مسؤول المخزن',
    AUDITOR: 'مراقب'
  };
  var VIEW_LABELS = {
    dashboard: 'لوحة المتابعة',
    movements: 'الحركات',
    items: 'الأصناف',
    reports: 'التقارير',
    admin: 'الإدارة'
  };
  var AUTH_ERROR_CODES = {
    AUTH_REQUIRED: true,
    INVALID_SESSION: true,
    SESSION_EXPIRED: true,
    SESSION_REVOKED: true,
    SESSION_INVALID: true,
    SESSION_INVALIDATED: true,
    USER_INACTIVE: true,
    ACCOUNT_INACTIVE: true,
    ACCOUNT_DISABLED: true
  };

  var state = {
    token: '',
    user: null,
    permissions: null,
    dashboard: null,
    dashboardDays: DASHBOARD_DEFAULT_DAYS,
    dashboardLoadedDays: 0,
    dashboardRequestId: 0,
    dashboardLoading: false,
    sessionGeneration: 0,
    listRequestIds: { items: 0, movements: 0, users: 0 },
    catalogItems: [],
    itemOwners: [],
    itemCatalog: { total: 0, activeTotal: 0, returned: 0, truncated: false },
    items: [],
    movements: [],
    recentMovements: [],
    users: [],
    currentView: 'dashboard',
    loaded: { dashboard: false, items: false, movements: false, users: false },
    paging: {
      items: { page: 1, pageSize: PAGE_SIZE, total: 0, hasMore: false },
      movements: { page: 1, pageSize: PAGE_SIZE, total: 0, hasMore: false },
      users: { page: 1, pageSize: PAGE_SIZE, total: 0, hasMore: false }
    },
    lastResponses: { items: null, movements: null, users: null },
    movementReportParams: null,
    searchActions: [],
    searchIndex: -1,
    globalSearchTimer: 0,
    globalSearchRequestId: 0,
    dialogReturnFocus: null,
    dialogOperationId: 0,
    dialogPending: false,
    credentials: null,
    loginUsername: '',
    quickMovementItems: [],
    quickMovementSearchTimer: 0,
    quickMovementRequestId: 0,
    quickMovementClientRequestId: '',
    quickMovementCorrection: null,
    quickItemEditing: null,
    administrativeReport: null,
    pendingRpcCount: 0
  };

  var dom = {};
  document.addEventListener('DOMContentLoaded', init);

  function init() {
    cacheDom();
    bindStaticEvents();
    bindTouchedValidation(dom.loginForm);
    bindTouchedValidation(dom.passwordChangeForm, passwordValidators());
    bindTouchedValidation(dom.quickMovementForm, quickMovementValidators());
    bindTouchedValidation(dom.quickItemForm);
    dom.quickMovementDate.value = localDateKey(new Date());
    state.quickMovementClientRequestId = newClientRequestId();
    showLogin();
    storeToken(readStoredToken());
    if (state.token) resumeSession();
  }

  function cacheDom() {
    [
      'globalAnnouncer', 'toastRegion', 'loginView', 'loginForm', 'loginUsername',
      'loginPassword', 'loginError', 'loginSubmit', 'appShell', 'mainContent',
      'globalSearch', 'globalSearchInput', 'globalSearchResults', 'currentUserName',
      'currentUserRole', 'logoutButton', 'footerSession', 'dashboardState',
      'dashboardSubtitle', 'dashboardRange', 'dashboardPeriodLabel', 'metricGrid',
      'movementSummary', 'movementTrend', 'movementTrendData', 'movementTrendTable',
      'stockOverview', 'urgentItems', 'recentMovements',
      'movementFilters', 'movementQuery', 'movementTypeFilter', 'movementItemFilter',
      'movementOwnerFilter',
      'movementDateFrom', 'movementDateTo', 'movementsState', 'movementsTableBody',
      'movementReportPanel', 'movementReportState', 'movementReportByUnit',
      'movementReportItemsTable', 'movementReportItemsBody', 'exportMovementExcel',
      'exportMovementPdf', 'exportMovementCsv',
      'movementsPagination', 'movementsPrev', 'movementsNext', 'movementsPageText',
      'itemFilters', 'itemQuery', 'itemOwnerFilter', 'itemStatusFilter', 'itemsState', 'itemsTableBody',
      'itemsPagination', 'itemsPrev', 'itemsNext', 'itemsPageText', 'exportInventoryCsv', 'csvDataset',
      'csvScopeNote', 'exportCsvButton', 'createBackupButton', 'backupResult', 'reportState',
      'reportTableBody', 'userFilters', 'userQuery', 'userStatusFilter', 'usersState',
      'usersTableBody', 'usersPagination', 'usersPrev', 'usersNext', 'usersPageText',
      'entityDialog', 'entityDialogEyebrow', 'entityDialogTitle', 'entityDialogClose',
      'entityDialogBody', 'passwordChangeDialog', 'passwordChangeForm', 'currentPassword',
      'newPassword', 'confirmPassword', 'passwordStrength', 'passwordChangeError',
      'passwordChangeSubmit', 'credentialsDialog', 'credentialUsername',
      'credentialPassword', 'credentialsCopyStatus', 'copyCredentialsButton',
      'credentialsDoneButton', 'syncIndicator', 'syncStatusText', 'operationRail',
      'quickMovementForm', 'quickMovementTypeIn', 'quickMovementTypeOut',
      'quickMovementSearch', 'quickMovementItem', 'quickMovementContext',
      'quickMovementQuantity', 'quickMovementDate', 'quickMovementReference',
      'quickMovementParty', 'quickMovementNotes', 'quickMovementOperator',
      'quickMovementError', 'quickMovementSubmit', 'quickMovementCancelCorrection', 'quickItemPanel', 'quickItemForm',
      'quickItemId', 'quickItemCode', 'quickItemName', 'quickItemOwner',
      'quickItemUnit', 'quickItemOpeningField', 'quickItemOpening', 'quickItemReorder',
      'quickItemActive', 'quickItemError', 'quickItemSubmit', 'quickItemCancel',
      'ownersSummary', 'reportsDialog', 'reportsDialogClose', 'adminDialog',
      'adminDialogClose', 'administrativeReportDialog', 'administrativeReportClose',
      'administrativeReportDone', 'administrativeReportPrint', 'administrativeReportState',
      'administrativeReportContent'
    ].forEach(function (id) { dom[id] = document.getElementById(id); });
  }

  function bindStaticEvents() {
    dom.loginForm.addEventListener('submit', handleLogin);
    dom.passwordChangeForm.addEventListener('submit', handlePasswordChange);
    dom.newPassword.addEventListener('input', updatePasswordStrength);
    dom.logoutButton.addEventListener('click', handleLogout);
    dom.quickMovementForm.addEventListener('submit', handleQuickMovementSubmit);
    dom.quickMovementCancelCorrection.addEventListener('click', resetQuickMovementForm);
    dom.quickMovementSearch.addEventListener('input', scheduleQuickMovementSearch);
    dom.quickMovementItem.addEventListener('change', renderQuickMovementPreview);
    dom.quickMovementQuantity.addEventListener('input', renderQuickMovementPreview);
    dom.quickMovementTypeIn.addEventListener('change', updateQuickMovementType);
    dom.quickMovementTypeOut.addEventListener('change', updateQuickMovementType);
    dom.quickItemForm.addEventListener('submit', handleQuickItemSubmit);
    dom.quickItemCancel.addEventListener('click', resetQuickItemForm);
    dom.reportsDialogClose.addEventListener('click', function () { dom.reportsDialog.close(); });
    dom.adminDialogClose.addEventListener('click', function () { dom.adminDialog.close(); });
    dom.administrativeReportClose.addEventListener('click', function () { dom.administrativeReportDialog.close(); });
    dom.administrativeReportDone.addEventListener('click', function () { dom.administrativeReportDialog.close(); });
    dom.administrativeReportPrint.addEventListener('click', printAdministrativeReport);
    [dom.reportsDialog, dom.adminDialog, dom.administrativeReportDialog].forEach(function (dialog) {
      dialog.addEventListener('click', closeDialogFromBackdrop);
      dialog.addEventListener('close', restoreDialogFocus);
    });

    document.addEventListener('click', function (event) {
      var navButton = event.target.closest('[data-nav-view]');
      if (navButton) {
        event.preventDefault();
        navigate(navButton.getAttribute('data-nav-view'), { focus: true });
        return;
      }
      var actionButton = event.target.closest('[data-action]');
      if (actionButton) {
        handleAction(actionButton.getAttribute('data-action'), actionButton);
        return;
      }
      var toggle = event.target.closest('[data-password-toggle]');
      if (toggle) {
        togglePasswordVisibility(toggle);
        return;
      }
      if (!event.target.closest('#globalSearch')) closeSearchResults();
    });

    dom.entityDialogClose.addEventListener('click', requestEntityDialogClose);
    dom.entityDialog.addEventListener('click', closeDialogFromBackdrop);
    dom.entityDialog.addEventListener('cancel', function (event) {
      if (state.dialogPending) event.preventDefault();
    });
    dom.entityDialog.addEventListener('close', restoreDialogFocus);
    dom.credentialsDialog.addEventListener('close', function () {
      state.credentials = null;
      clearNode(dom.credentialUsername);
      clearNode(dom.credentialPassword);
      dom.credentialsCopyStatus.textContent = '';
      restoreDialogFocus();
    });
    dom.passwordChangeDialog.addEventListener('cancel', function (event) { event.preventDefault(); });
    dom.credentialsDialog.addEventListener('cancel', function (event) { event.preventDefault(); });

    dom.credentialsDoneButton.addEventListener('click', function () { dom.credentialsDialog.close(); });
    dom.copyCredentialsButton.addEventListener('click', copyCredentials);
    dom.exportCsvButton.addEventListener('click', exportCsv);
    dom.csvDataset.addEventListener('change', updateCsvScopeNote);
    dom.createBackupButton.addEventListener('click', createBackup);
    dom.exportInventoryCsv.addEventListener('click', exportInventoryBalances);
    dom.exportMovementCsv.addEventListener('click', exportMovementLog);
    dom.exportMovementExcel.addEventListener('click', exportMovementReportExcel);
    dom.exportMovementPdf.addEventListener('click', exportMovementReportPdf);

    dom.dashboardRange.addEventListener('change', function (event) {
      if (!event.target.matches('input[name="dashboardDays"]')) return;
      var days = Number(event.target.value);
      if ([7, 30, 90].indexOf(days) === -1 || days === state.dashboardDays) return;
      state.dashboardDays = days;
      loadDashboard(true);
    });

    dom.movementFilters.addEventListener('submit', function (event) {
      event.preventDefault();
      state.paging.movements.page = 1;
      loadMovements();
    });
    dom.movementFilters.addEventListener('reset', function () {
      window.setTimeout(function () { state.paging.movements.page = 1; loadMovements(); }, 0);
    });
    dom.itemFilters.addEventListener('submit', function (event) {
      event.preventDefault();
      state.paging.items.page = 1;
      loadItems();
    });
    dom.itemFilters.addEventListener('reset', function () {
      window.setTimeout(function () { state.paging.items.page = 1; loadItems(); }, 0);
    });
    dom.userFilters.addEventListener('submit', function (event) {
      event.preventDefault();
      state.paging.users.page = 1;
      loadUsers();
    });
    dom.userFilters.addEventListener('reset', function () {
      window.setTimeout(function () { state.paging.users.page = 1; loadUsers(); }, 0);
    });

    dom.movementsPrev.addEventListener('click', function () { changePage('movements', -1); });
    dom.movementsNext.addEventListener('click', function () { changePage('movements', 1); });
    dom.itemsPrev.addEventListener('click', function () { changePage('items', -1); });
    dom.itemsNext.addEventListener('click', function () { changePage('items', 1); });
    dom.usersPrev.addEventListener('click', function () { changePage('users', -1); });
    dom.usersNext.addEventListener('click', function () { changePage('users', 1); });

    dom.globalSearchInput.addEventListener('input', renderGlobalSearch);
    dom.globalSearchInput.addEventListener('focus', renderGlobalSearch);
    dom.globalSearchInput.addEventListener('keydown', handleSearchKeydown);
    dom.globalSearchResults.addEventListener('click', function (event) {
      var result = event.target.closest('.search-result');
      if (!result) return;
      activateSearchResult(Number(result.getAttribute('data-search-index')));
    });
    document.addEventListener('keydown', handleGlobalShortcut);
    window.addEventListener('hashchange', function () {
      if (!dom.appShell.hidden) navigate(viewFromHash(), { updateHash: false, focus: true });
    });
  }

  function readStoredToken() {
    try { return window.sessionStorage.getItem(SESSION_KEY) || ''; }
    catch (ignored) { return ''; }
  }

  function storeToken(token) {
    var nextToken = String(token || '');
    if (nextToken !== state.token) state.sessionGeneration += 1;
    state.token = nextToken;
    try {
      if (state.token) window.sessionStorage.setItem(SESSION_KEY, state.token);
      else window.sessionStorage.removeItem(SESSION_KEY);
    } catch (ignored) { /* A private browser context can deny sessionStorage. */ }
  }

  function rpcPublic(method, payload) {
    return runRpc(method, [payload || {}]);
  }

  function rpc(method, payload) {
    if (!state.token) return Promise.reject(appError('AUTH_REQUIRED', 'انتهت جلسة الدخول. سجّل الدخول من جديد.'));
    var token = state.token;
    var generation = state.sessionGeneration;
    return runRpc(method, [token, payload || {}]).then(function (data) {
      if (generation !== state.sessionGeneration || token !== state.token) {
        throw appError('STALE_RESPONSE', 'تم تجاهل استجابة من جلسة سابقة.');
      }
      return data;
    }).catch(function (error) {
      if (generation !== state.sessionGeneration || token !== state.token) {
        throw appError('STALE_RESPONSE', 'تم تجاهل استجابة من جلسة سابقة.');
      }
      throw error;
    });
  }

  function runRpc(method, args) {
    beginSync();
    return new Promise(function (resolve, reject) {
      if (!window.google || !google.script || !google.script.run) {
        endSync(false);
        reject(appError('RPC_UNAVAILABLE', 'تعذّر الاتصال بتطبيق Google Apps Script. افتح رابط النشر التنفيذي من جديد.'));
        return;
      }
      var runner = google.script.run
        .withSuccessHandler(function (response) {
          endSync(true);
          if (response && response.ok === true) {
            resolve(response.data);
            return;
          }
          if (response && response.ok === false) {
            reject(appError(
              response.error && response.error.code,
              response.error && response.error.message,
              response.error && response.error.details
            ));
            return;
          }
          resolve(response);
        })
        .withFailureHandler(function (failure) {
          endSync(false);
          reject(appError('RPC_FAILURE', failure && failure.message ? failure.message : 'فشل الاتصال بالخادم.'));
        });

      try {
        if (args.length === 1) runner[method](args[0]);
        else runner[method](args[0], args[1]);
      } catch (error) {
        endSync(false);
        reject(appError('RPC_FAILURE', error && error.message ? error.message : 'تعذّر إرسال الطلب.'));
      }
    });
  }

  function beginSync() {
    state.pendingRpcCount += 1;
    if (!dom.syncIndicator || !dom.syncStatusText) return;
    dom.syncIndicator.dataset.state = 'loading';
    dom.syncStatusText.textContent = 'جارٍ التحديث…';
  }

  function endSync(success) {
    state.pendingRpcCount = Math.max(0, state.pendingRpcCount - 1);
    if (!dom.syncIndicator || !dom.syncStatusText || state.pendingRpcCount) return;
    dom.syncIndicator.dataset.state = success ? 'success' : 'error';
    dom.syncStatusText.textContent = success ? 'متصل بالنظام' : 'تعذّر الاتصال';
  }

  function appError(code, message, details) {
    var error = new Error(message || 'حدث خطأ غير متوقع.');
    error.code = code || 'UNKNOWN_ERROR';
    error.details = details || null;
    return error;
  }

  function resumeSession() {
    setLoading(dom.loginSubmit, true);
    rpc('getBootstrap', {}).then(function (data) {
      if (data && data.passwordChangeRequired) {
        state.user = data.user || state.user;
        state.permissions = data.permissions || null;
        showPasswordChangeGate();
        return;
      }
      applyBootstrap(data);
      showApp();
    }).catch(function (error) {
      if (error.code === 'PASSWORD_CHANGE_REQUIRED') {
        showPasswordChangeGate();
      } else if (AUTH_ERROR_CODES[error.code]) {
        clearSession();
        showLogin();
        if (error.code !== 'AUTH_REQUIRED') showInlineError(dom.loginError, error.message);
      } else {
        showLogin();
        showInlineError(dom.loginError, (error.message || 'تعذّر الاتصال بالخادم.') + ' لم تُلغَ جلستك؛ أعد المحاولة.');
      }
    }).finally(function () { setLoading(dom.loginSubmit, false); });
  }

  function handleLogin(event) {
    event.preventDefault();
    hideInlineError(dom.loginError);
    if (!validateForm(dom.loginForm)) return;
    var credentials = {
      username: dom.loginUsername.value.trim(),
      password: dom.loginPassword.value
    };
    state.loginUsername = credentials.username;
    setLoading(dom.loginSubmit, true);
    rpcPublic('authenticate', credentials).then(function (result) {
      if (!result || !result.token || !result.user) throw appError('INVALID_RESPONSE', 'استجابة تسجيل الدخول غير مكتملة.');
      storeToken(result.token);
      state.user = result.user;
      dom.loginPassword.value = '';
      if (result.user.forcePasswordChange) {
        showPasswordChangeGate();
        return;
      }
      return rpc('getBootstrap', {}).then(function (data) {
        if (data && data.passwordChangeRequired) {
          state.user = data.user || state.user;
          state.permissions = data.permissions || null;
          showPasswordChangeGate();
          return;
        }
        applyBootstrap(data);
        showApp();
      });
    }).catch(function (error) {
      if (error.code === 'PASSWORD_CHANGE_REQUIRED' && state.token) {
        showPasswordChangeGate();
        return;
      }
      var loginMessage = error.message;
      if (error.code === 'USER_DATA_INVALID' && String(credentials.username).toLowerCase() === 'admin' && /مكرر/.test(loginMessage)) {
        loginMessage += ' افتح ملف Google Sheets كمالك، ثم اختر «نظام المخزون ← استعادة دخول المدير».';
      }
      showInlineError(dom.loginError, loginMessage);
      announce('تعذّر تسجيل الدخول. ' + loginMessage);
      dom.loginPassword.focus();
    }).finally(function () { setLoading(dom.loginSubmit, false); });
  }

  function showPasswordChangeGate() {
    dom.appShell.hidden = true;
    dom.loginView.hidden = false;
    hideInlineError(dom.passwordChangeError);
    dom.passwordChangeForm.reset();
    resetFormValidation(dom.passwordChangeForm);
    updatePasswordStrength();
    if (!dom.passwordChangeDialog.open) dom.passwordChangeDialog.showModal();
    window.setTimeout(function () { dom.currentPassword.focus(); }, 0);
  }

  function passwordValidators() {
    return {
      newPassword: function (input) {
        var value = input.value;
        if (!value) return 'كلمة المرور الجديدة مطلوبة.';
        if (value.length < 6) return 'استخدم 6 محارف على الأقل.';
        return '';
      },
      confirmPassword: function (input) {
        if (!input.value) return 'تأكيد كلمة المرور مطلوب.';
        return input.value === dom.newPassword.value ? '' : 'كلمتا المرور غير متطابقتين.';
      }
    };
  }

  function updatePasswordStrength() {
    var value = dom.newPassword.value || '';
    var level = !value ? 0 : value.length < 6 ? 1 : 4;
    var labels = ['لم تُكتب كلمة المرور بعد', 'قصيرة جداً', '', '', 'مقبولة'];
    dom.passwordStrength.setAttribute('data-level', String(level));
    dom.passwordStrength.querySelector('.strength-label').textContent = labels[level];
    if (dom.confirmPassword.dataset.touched === 'true') validateField(dom.confirmPassword, passwordValidators());
  }

  function handlePasswordChange(event) {
    event.preventDefault();
    hideInlineError(dom.passwordChangeError);
    if (!validateForm(dom.passwordChangeForm, passwordValidators())) return;
    setLoading(dom.passwordChangeSubmit, true);
    rpc('changeMyPassword', {
      currentPassword: dom.currentPassword.value,
      newPassword: dom.newPassword.value
    }).then(function () {
      var username = state.user && state.user.username ? state.user.username : state.loginUsername;
      clearSession();
      dom.passwordChangeDialog.close();
      showLogin();
      dom.loginUsername.value = username || '';
      announce('تم تغيير كلمة المرور. سجّل الدخول بكلمة المرور الجديدة.');
      showToast('تم تغيير كلمة المرور', 'سجّل الدخول الآن بكلمة المرور الجديدة.', 'success');
      dom.loginPassword.focus();
    }).catch(function (error) {
      if (handlePossibleAuthError(error)) return;
      var message = error && error.message ? error.message : 'تعذّر تغيير كلمة المرور.';
      showInlineError(dom.passwordChangeError, message);
      announce('تعذّر تغيير كلمة المرور. راجع البيانات وحاول مرة أخرى.');
      if (error && error.code === 'INVALID_CURRENT_PASSWORD') {
        dom.currentPassword.value = '';
        dom.currentPassword.focus();
      } else {
        dom.newPassword.focus();
      }
    }).finally(function () { setLoading(dom.passwordChangeSubmit, false); });
  }

  function handleLogout() {
    var token = state.token;
    dom.logoutButton.disabled = true;
    if (!token) {
      clearSession();
      showLogin();
      return;
    }
    rpc('logout', {}).catch(function () {
      /* The local token is still destroyed when server invalidation is unavailable. */
    }).finally(function () {
      clearSession();
      showLogin();
      dom.logoutButton.disabled = false;
      announce('تم تسجيل الخروج.');
      dom.loginUsername.focus();
    });
  }

  function clearSession() {
    storeToken('');
    state.user = null;
    state.permissions = null;
    state.dashboard = null;
    state.dashboardDays = DASHBOARD_DEFAULT_DAYS;
    state.dashboardLoadedDays = 0;
    state.dashboardRequestId += 1;
    state.listRequestIds.items += 1;
    state.listRequestIds.movements += 1;
    state.listRequestIds.users += 1;
    state.dashboardLoading = false;
    state.catalogItems = [];
    state.itemOwners = [];
    state.itemCatalog = { total: 0, activeTotal: 0, returned: 0, truncated: false };
    state.items = [];
    state.movements = [];
    state.recentMovements = [];
    state.users = [];
    state.loaded = { dashboard: false, items: false, movements: false, users: false };
    state.lastResponses = { items: null, movements: null, users: null };
    state.movementReportParams = null;
    state.paging = {
      items: { page: 1, pageSize: PAGE_SIZE, total: 0, hasMore: false },
      movements: { page: 1, pageSize: PAGE_SIZE, total: 0, hasMore: false },
      users: { page: 1, pageSize: PAGE_SIZE, total: 0, hasMore: false }
    };
    state.credentials = null;
    state.quickMovementItems = [];
    state.quickMovementRequestId += 1;
    window.clearTimeout(state.quickMovementSearchTimer);
    state.quickMovementClientRequestId = newClientRequestId();
    state.quickMovementCorrection = null;
    state.quickItemEditing = null;
    if (dom.appShell) dom.appShell.removeAttribute('data-role');
    window.clearTimeout(state.globalSearchTimer);
    state.globalSearchRequestId += 1;
    resetFilterControls();
    closeSearchResults();
  }

  function resetFilterControls() {
    if (!dom.movementQuery) return;
    dom.movementQuery.value = '';
    dom.movementTypeFilter.value = '';
    dom.movementItemFilter.value = '';
    dom.movementOwnerFilter.value = '';
    dom.movementDateFrom.value = '';
    dom.movementDateTo.value = '';
    dom.itemQuery.value = '';
    dom.itemOwnerFilter.value = '';
    dom.itemStatusFilter.value = '';
    dom.userQuery.value = '';
    dom.userStatusFilter.value = '';
    dom.globalSearchInput.value = '';
    updateCsvScopeNote();
  }

  function forceSignOut(message) {
    clearSession();
    if (dom.passwordChangeDialog.open) dom.passwordChangeDialog.close();
    if (dom.entityDialog.open) dom.entityDialog.close();
    if (dom.credentialsDialog.open) dom.credentialsDialog.close();
    if (dom.reportsDialog.open) dom.reportsDialog.close();
    if (dom.adminDialog.open) dom.adminDialog.close();
    showLogin();
    showInlineError(dom.loginError, message || 'انتهت جلسة الدخول. سجّل الدخول من جديد.');
    announce(message || 'انتهت جلسة الدخول.');
  }

  function showLogin() {
    if (dom.reportsDialog && dom.reportsDialog.open) dom.reportsDialog.close();
    if (dom.adminDialog && dom.adminDialog.open) dom.adminDialog.close();
    dom.appShell.hidden = true;
    dom.loginView.hidden = false;
    document.body.classList.remove('is-authenticated');
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  function showApp() {
    dom.loginView.hidden = true;
    dom.appShell.hidden = false;
    document.body.classList.add('is-authenticated');
    applyRoleVisibility();
    renderUserIdentity();
    populateQuickMovementItems(state.catalogItems);
    resetQuickMovementForm();
    resetQuickItemForm();
    renderDashboard();
    renderReport();
    document.querySelectorAll('#view-dashboard, #view-items, #view-movements').forEach(function (section) {
      section.hidden = false;
      section.classList.add('is-active');
    });
    loadItems();
    loadMovements();
    window.scrollTo({ top: 0, behavior: 'auto' });

      svg.appendChild(svgTextElement('text', { x: xForIndex(index), y: 236, 'class': 'trend-axis-label trend-axis-label--date', 'text-anchor': 'middle' }, formatShortDate(points[index].date)));

  function urgentItemsForDashboard(dashboard) {
    var rows = normalizeCollection(dashboard.urgentItems, 'items');
    if (!rows.length) {
      rows = state.catalogItems.filter(function (item) {
        var key = itemStatus(item).key;
        return item.active !== false && (key === 'LOW' || key === 'OUT');
      });
    }
    return rows.slice().sort(function (a, b) {
      var aStatus = itemStatus(a).key;
      var bStatus = itemStatus(b).key;
      if (aStatus !== bStatus) return aStatus === 'INACTIVE' ? -1 : (bStatus === 'INACTIVE' ? 1 : (aStatus === 'OUT' ? -1 : 1));
      var aLevel = Number(a.reorderLevel) || 0;
      var bLevel = Number(b.reorderLevel) || 0;
      var aCoverage = aLevel > 0 ? itemQuantity(a) / aLevel : Number.POSITIVE_INFINITY;
      var bCoverage = bLevel > 0 ? itemQuantity(b) / bLevel : Number.POSITIVE_INFINITY;
      return aCoverage - bCoverage || String(a.code || '').localeCompare(String(b.code || ''));
    });
  }

  function openUrgentItem(item, status) {
    var wasLoaded = state.loaded.items;
    dom.itemQuery.value = item.code || item.name || '';
    dom.itemStatusFilter.value = status.key === 'INACTIVE' ? '' : (status.key === 'OUT' ? 'OUT' : 'LOW');
    state.paging.items.page = 1;
    navigate('items', { focus: true });
    if (wasLoaded) loadItems();

  function formatDashboardRange(dashboard) {
    var range = dashboard && dashboard.range || {};
    if (range.from && range.to) return 'من ' + formatDate(range.from, false) + ' إلى ' + formatDate(range.to, false);
    return 'آخر ' + formatNumber(Number(range.days) || state.dashboardDays) + ' يوماً';
  }

  function formatShortDate(value) {
    var date = /^\d{4}-\d{2}-\d{2}$/.test(String(value || '')) ? new Date(String(value) + 'T12:00:00') : new Date(value);
    if (isNaN(date.getTime())) return String(value || '');
    try { return new Intl.DateTimeFormat('ar-PS', { day: 'numeric', month: 'short' }).format(date); }
    catch (ignored) { return String(date.getMonth() + 1) + '/' + String(date.getDate()); }
  }

  function localDateKey(date) {
    return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
  }

  function numericOrUndefined(value) {
    if (value === undefined || value === null || value === '') return undefined;
    var number = Number(value);
    return isFinite(number) ? number : undefined;
  }

  function uniqueNumbers(values) {
    var seen = {};
    return values.filter(function (value) {
      if (seen[value]) return false;
      seen[value] = true;
      return true;
    });
  }

  function svgElement(tag, attributes) {
    var element = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.keys(attributes || {}).forEach(function (name) { element.setAttribute(name, String(attributes[name])); });
    return element;
  }

  function svgTextElement(tag, attributes, text) {
    var element = svgElement(tag, attributes);
    element.textContent = text === undefined || text === null ? '' : String(text);
    return element;
  }

  function findCatalogItem(itemId, itemCode) {
    return state.catalogItems.find(function (item) {

    }) || null;
  }

      dom.metricGrid.appendChild(card);
    }
  }

  function loadMovements() {
    var requestId = ++state.listRequestIds.movements;
    var params = {
      query: dom.movementQuery.value.trim(),
      type: dom.movementTypeFilter.value,
      itemQuery: dom.movementItemFilter.value.trim(),
      owner: dom.movementOwnerFilter.value,
      dateFrom: dom.movementDateFrom.value,
      dateTo: dom.movementDateTo.value,
      page: state.paging.movements.page,
      pageSize: state.paging.movements.pageSize
    };
    var reportParams = {
      query: params.query,
      type: params.type,
      itemQuery: params.itemQuery,
      itemLabel: params.itemQuery || 'كل الأصناف',
      owner: params.owner,
      dateFrom: params.dateFrom,
      dateTo: params.dateTo
    };
    renderLoading(dom.movementsState);
    renderMovementReportLoading();
    clearNode(dom.movementsTableBody);
    return rpc('listMovements', params).then(function (data) {
      if (requestId !== state.listRequestIds.movements) return;
      var rows = normalizeCollection(data, 'movements');
      state.movements = rows;
      state.lastResponses.movements = data || {};
      state.movementReportParams = reportParams;
      state.loaded.movements = true;
      applyPaging('movements', data || {}, rows.length);
      clearNode(dom.movementsState);
      renderMovementsTable(rows);
      renderMovementReport(data && data.summary);
      updatePagination('movements');
      if (!rows.length) renderEmpty(dom.movementsState, 'movements', 'لا توجد حركات تطابق المرشحات الحالية.');
    }).catch(function (error) {
      if (requestId !== state.listRequestIds.movements || error.code === 'STALE_RESPONSE') return;
      if (handlePossibleAuthError(error)) return;
      renderMovementReportError(error && error.message);
      renderError(dom.movementsState, error.message, loadMovements);
    });
  }

  function renderMovementReportLoading() {
    dom.movementReportPanel.setAttribute('aria-busy', 'true');
    dom.movementReportPanel.setAttribute('data-state', 'loading');
    dom.exportMovementCsv.disabled = true;
    dom.exportMovementExcel.disabled = true;
    dom.exportMovementPdf.disabled = true;
    clearNode(dom.movementReportState);
    dom.movementReportState.appendChild(createText('p', 'state-inline', 'جارٍ حساب إجماليات كل الحركات المطابقة للمرشحات…'));

    clearNode(dom.movementReportItemsBody);

    dom.movementReportPanel.setAttribute('data-state', 'error');
    dom.exportMovementCsv.disabled = true;
    dom.exportMovementExcel.disabled = true;
    dom.exportMovementPdf.disabled = true;
    clearNode(dom.movementReportState);
    var copy = message || 'تعذّر حساب تقرير الحركات.';
    dom.movementReportState.appendChild(createText('p', 'inline-alert inline-alert--error', copy));
    clearNode(dom.movementReportByUnit);
    clearNode(dom.movementReportItemsBody);
  }

  }

  function renderMovementReport(summary) {
    dom.movementReportPanel.setAttribute('aria-busy', 'false');
    clearNode(dom.movementReportState);
    clearNode(dom.movementReportByUnit);
    clearNode(dom.movementReportItemsBody);

    if (!summary || !Array.isArray(summary.byUnit) || !Array.isArray(summary.byItem)) {
      dom.movementReportPanel.setAttribute('data-state', 'unavailable');
      dom.exportMovementCsv.disabled = true;
      dom.exportMovementExcel.disabled = true;
      dom.exportMovementPdf.disabled = true;
      dom.movementReportState.appendChild(createText('p', 'inline-alert inline-alert--error', 'بيانات التقرير غير متاحة في نسخة الخادم الحالية. انشر أحدث نسخة من ملفات Apps Script ثم أعد المحاولة.'));
      return;
    }

    var movementCount = Math.max(0, Number(summary.movementCount) || 0);

      'p',
      'movement-report__scope',

    ));

    summary.byUnit.forEach(function (unitRow) {
      dom.movementReportByUnit.appendChild(createMovementUnitCard(unitRow));
    });

    summary.byItem.forEach(function (itemRow) {
      var tr = document.createElement('tr');
      addCell(tr, 'الصنف', itemRow.itemName || '—');

      dom.movementReportItemsBody.appendChild(tr);

    dom.exportMovementPdf.disabled = !summary.byItem.length;

  function applyPaging(key, data, rowCount) {
    var paging = state.paging[key];
    paging.page = Number(data.page) || paging.page || 1;
    paging.pageSize = Number(data.pageSize) || paging.pageSize || PAGE_SIZE;
    paging.total = Number(data.total);
    if (!isFinite(paging.total)) paging.total = ((paging.page - 1) * paging.pageSize) + rowCount + (data.hasMore ? 1 : 0);
    paging.hasMore = typeof data.hasMore === 'boolean' ? data.hasMore : paging.page * paging.pageSize < paging.total;
  }

  function updatePagination(key) {
    var paging = state.paging[key];
    var capitalized = key.charAt(0).toUpperCase() + key.slice(1);
    var container = dom[key + 'Pagination'];
    var prev = dom[key + 'Prev'];
    var next = dom[key + 'Next'];
    var textNode = dom[key + 'PageText'];
    var pages = Math.max(1, Math.ceil(paging.total / paging.pageSize));
    container.hidden = paging.total <= paging.pageSize && paging.page <= 1 && !paging.hasMore;
    prev.disabled = paging.page <= 1;
    next.disabled = !paging.hasMore && paging.page >= pages;
    textNode.textContent = 'الصفحة ' + formatNumber(paging.page) + (paging.total ? ' من ' + formatNumber(pages) : '');
    void capitalized;
  }

  function changePage(key, delta) {
    var paging = state.paging[key];
    var nextPage = Math.max(1, paging.page + delta);
    if (delta > 0 && !paging.hasMore && nextPage * paging.pageSize > paging.total + paging.pageSize) return;
    paging.page = nextPage;
    if (key === 'movements') loadMovements();
    else if (key === 'items') loadItems();
    else loadUsers();
    dom.mainContent.focus({ preventScroll: true });
  }

  function movementTypeBadge(type) {
    var normalized = String(type || '').toUpperCase();
    var labels = { IN: 'إدخال', OUT: 'صرف', REVERSAL: 'عكس' };
    var badge = createElement('span', 'type-badge type-badge--' + (normalized === 'IN' ? 'in' : normalized === 'OUT' ? 'out' : 'reversal'));
    var symbol = createText('span', 'mono', normalized === 'IN' ? '+' : normalized === 'OUT' ? '−' : '↶');

    return badge;
  }

  function itemQuantity(item) {
    var value = firstDefined(item || {}, ['currentQuantity', 'quantity', 'balance', 'stock']);
    if (value === undefined) value = item && item.openingQuantity !== undefined ? item.openingQuantity : 0;
    return Number(value) || 0;
  }

  function itemStatus(item) {
    if (item && item.active === false) return { key: 'INACTIVE', label: 'موقوف', tone: 'neutral' };
    var explicit = String((item && (item.stockStatus || item.status)) || '').toUpperCase();
    if (explicit === 'AVAILABLE' || explicit === 'OK' || explicit === 'IN_STOCK') return { key: 'AVAILABLE', label: 'متوفر', tone: 'ok' };
    if (explicit === 'LOW' || explicit === 'LOW_STOCK') return { key: 'LOW', label: 'منخفض', tone: 'warning' };
    if (explicit === 'OUT' || explicit === 'OUT_OF_STOCK') return { key: 'OUT', label: 'نافد', tone: 'danger' };
    var quantity = itemQuantity(item || {});
    var reorder = Number(item && item.reorderLevel) || 0;
    if (quantity <= 0) return { key: 'OUT', label: 'نافد', tone: 'danger' };
    if (quantity <= reorder) return { key: 'LOW', label: 'منخفض', tone: 'warning' };
    return { key: 'AVAILABLE', label: 'متوفر', tone: 'ok' };
  }

  function statusShape(status) {

  function quickMovementValidators() {
    return {
      itemId: function () {
        return selectedQuickMovementItem() ? '' : 'اختر صنفاً من نتائج البحث.';
      },
      quantity: function (input) {
        var quantity = Number(input.value);
        if (!isFinite(quantity) || quantity <= 0) return 'أدخل كمية أكبر من صفر.';
        var item = selectedQuickMovementItem();
        if (item && quickMovementType() === 'OUT' && quantity > itemQuantity(item) + 0.0000001) {
          return 'الكمية المصروفة أكبر من الرصيد الحالي. خفّض الكمية أو اختر صنفاً آخر.';
        }
        return '';
      },
      documentDate: function (input) { return input.value ? '' : 'اختر تاريخ المستند.'; },
      reference: function (input) { return input.value.trim() ? '' : 'أدخل رقم الإذن أو الفاتورة.'; },
      party: function (input) { return input.value.trim() ? '' : 'أدخل الجهة المستفيدة أو المورّدة.'; }
    };
  }

  function quickMovementType() {
    return dom.quickMovementTypeOut.checked ? 'OUT' : 'IN';
  }

  function selectedQuickMovementItem() {
    var id = dom.quickMovementItem.value;
    return state.quickMovementItems.find(function (item) { return String(item.id) === String(id); }) ||
      state.catalogItems.find(function (item) { return String(item.id) === String(id); }) || null;
  }

  function populateQuickMovementItems(items) {
    if (!dom.quickMovementItem) return;
    var selectedId = dom.quickMovementItem.value;
    var activeItems = (items || []).filter(function (item) { return item && item.active !== false; });
    state.quickMovementItems = dedupeById(activeItems);
    clearNode(dom.quickMovementItem);
    var placeholder = document.createElement('option');
    placeholder.value = '';

    dom.quickMovementItem.appendChild(placeholder);
    state.quickMovementItems.forEach(function (item) {
      var option = document.createElement('option');
      option.value = item.id;
      option.textContent = (item.code || '—') + ' — ' + (item.name || '—') + ' — ' + formatNumber(itemQuantity(item)) + ' ' + (item.unit || '');
      dom.quickMovementItem.appendChild(option);
    });
    if (state.quickMovementItems.some(function (item) { return String(item.id) === String(selectedId); })) {
      dom.quickMovementItem.value = selectedId;
    }
    renderQuickMovementPreview();

  function scheduleQuickMovementSearch() {
    window.clearTimeout(state.quickMovementSearchTimer);
    var query = dom.quickMovementSearch.value.trim();
    if (!query) {
      populateQuickMovementItems(state.catalogItems);
      return;
    }
    state.quickMovementSearchTimer = window.setTimeout(function () {
      var requestId = ++state.quickMovementRequestId;
      dom.quickMovementItem.disabled = true;
      rpc('listItems', { query: query, status: 'ACTIVE', page: 1, pageSize: 12 }).then(function (data) {
        if (requestId !== state.quickMovementRequestId) return;
        populateQuickMovementItems(normalizeCollection(data, 'items'));
      }).catch(function (error) {
        if (requestId !== state.quickMovementRequestId || handlePossibleAuthError(error)) return;
        showInlineError(dom.quickMovementError, error.message || 'تعذّر البحث في الأصناف.');
      }).finally(function () {
        if (requestId === state.quickMovementRequestId) dom.quickMovementItem.disabled = false;
      });
    }, 250);
  }

    renderMovementContext(dom.quickMovementContext, selectedQuickMovementItem(), quickMovementType(), Number(dom.quickMovementQuantity.value) || 0);

    if (dom.quickMovementItem.dataset.touched === 'true') validateField(dom.quickMovementItem, quickMovementValidators());

    dom.quickMovementSubmit.classList.toggle('button--movement-out', !incoming);
    dom.quickMovementSubmit.querySelector('.button__label').textContent = state.quickMovementCorrection ? 'حفظ التصحيح (عكس + بديل)' : (incoming ? 'ترحيل الإدخال' : 'ترحيل الصرف');

  function handleQuickMovementSubmit(event) {
    event.preventDefault();
    hideInlineError(dom.quickMovementError);
    var validators = quickMovementValidators();
    if (!validateForm(dom.quickMovementForm, validators)) return;
    var item = selectedQuickMovementItem();
    if (!item) return;
    var correction = state.quickMovementCorrection;
    var payload = {
      itemId: item.id,
      type: quickMovementType(),
      quantity: Number(dom.quickMovementQuantity.value),
      documentDate: dom.quickMovementDate.value,
      party: dom.quickMovementParty.value.trim(),
      reference: dom.quickMovementReference.value.trim(),
      notes: dom.quickMovementNotes.value.trim(),
      clientRequestId: state.quickMovementClientRequestId
    };
    if (correction) {
      payload.movementId = correction.movement.id;
      payload.reason = correction.reason;
    }
    setLoading(dom.quickMovementSubmit, true);
    rpc(correction ? 'correctMovement' : 'saveMovement', payload).then(function (result) {
      var label = correction ? 'تم حفظ التصحيح' : (quickMovementType() === 'IN' ? 'تم ترحيل الإدخال' : 'تم ترحيل الصرف');

      showAuditWarning(result);
      resetQuickMovementForm();
      return refreshAfterInventoryMutation();

      if (handlePossibleAuthError(error)) return;

  function openMovementForm(source, presetType) {

      return;

    var choices = state.catalogItems.filter(function (item) { return item.active !== false; });
    if (!choices.length) {
      var empty = emptyState('items', 'أضف صنفاً نشطاً قبل تسجيل أول حركة.');
      openEntityDialog('حركة مخزون', 'لا توجد أصناف متاحة', empty, source);
      return;
    }

    var form = createElement('form', 'form-grid');

    var typeField = createMovementTypeField(presetType);

    var dateField = createField({ id: 'movementDocumentDate', name: 'documentDate', label: 'تاريخ المستند', type: 'date', required: true, value: localDateKey(new Date()), help: 'تاريخ الفاتورة أو الإذن؛ يسجل الخادم وقت التدقيق تلقائياً.' });
    var partyField = createField({ id: 'movementParty', name: 'party', label: 'المورّد / جهة التوريد', type: 'text', required: true, maxLength: 200, full: true });
    var referenceField = createField({ id: 'movementReference', name: 'reference', label: 'رقم الفاتورة / إذن الاستلام', type: 'text', required: true, maxLength: 120, auto: true });
    var notesField = createField({ id: 'movementNotes', name: 'notes', label: 'ملاحظات إضافية', type: 'textarea', maxLength: 1000, full: true });
    var movementContext = createElement('div', 'movement-context field--full');
    movementContext.setAttribute('role', 'status');
    movementContext.setAttribute('aria-live', 'polite');
    var operator = createElement('div', 'movement-operator field--full');
    append(operator, makeIcon('user'), createText('span', '', 'مسؤول الترحيل والتدقيق'), createText('strong', '', state.user.displayName || state.user.username || '—'));
    var clientRequestId = newClientRequestId();
    append(form, typeField.wrap, itemPicker.wrap, movementContext, quantityField.wrap, dateField.wrap, partyField.wrap, referenceField.wrap, notesField.wrap, operator);
    var submit = addFormActions(form, presetType === 'IN' ? 'ترحيل الإدخال' : 'ترحيل الصرف', presetType === 'IN' ? 'button button--movement-in' : 'button button--movement-out');
    var validators = {
      itemSearch: function () {
        return itemPicker.getSelected() ? '' : 'ابحث باسم الصنف أو رمزه، ثم اختره من القائمة.';
      },
      quantity: function (input) {
        var selected = itemPicker.getSelected();
        var quantity = Number(input.value);
        if (!selected || !isFinite(quantity) || quantity <= 0) return '';
        if (typeField.value() === 'OUT' && quantity > itemQuantity(selected) + 0.0000001) {
          return 'الكمية المصروفة أكبر من الرصيد الحالي. خفّض الكمية أو اختر صنفاً آخر.';
        }
        return '';
      }
    };

    function updatePreview() {
      renderMovementContext(movementContext, itemPicker.getSelected(), typeField.value(), Number(quantityField.input.value) || 0);
      if (quantityField.input.dataset.touched === 'true') validateField(quantityField.input, validators);
      if (itemPicker.input.dataset.touched === 'true') validateField(itemPicker.input, validators);
    }

    function updateTypeCopy() {
      var type = typeField.value();
      var incoming = type === 'IN';
      form.dataset.movementType = type;
      quantityField.wrap.querySelector('label').textContent = incoming ? 'الكمية الواردة' : 'الكمية المصروفة';
      partyField.wrap.querySelector('label').textContent = incoming ? 'المورّد / جهة التوريد' : 'الجهة المستفيدة / المستلم';
      partyField.input.placeholder = incoming ? 'اسم المورّد أو جهة التوريد' : 'القسم أو الشخص المستلم';
      referenceField.wrap.querySelector('label').textContent = incoming ? 'رقم الفاتورة / إذن الاستلام' : 'رقم إذن الصرف / الطلب';
      referenceField.input.placeholder = incoming ? 'مثال: INV-1042' : 'مثال: OUT-1042';
      submit.classList.remove('button--movement-in', 'button--movement-out');
      submit.classList.add(incoming ? 'button--movement-in' : 'button--movement-out');
      submit.querySelector('.button__label').textContent = incoming ? 'ترحيل الإدخال' : 'ترحيل الصرف';
      dom.entityDialogTitle.textContent = incoming ? 'إدخال مخزون' : 'صرف مخزون';
      dom.entityDialogEyebrow.textContent = incoming ? 'زيادة موثّقة في الرصيد' : 'خصم موثّق من الرصيد';
      updatePreview();
    }

    typeField.inputs.forEach(function (input) { input.addEventListener('change', updateTypeCopy); });
    itemPicker.onChange(updatePreview);
    quantityField.input.addEventListener('input', updatePreview);
    bindTouchedValidation(form, validators);
    form.addEventListener('submit', function (event) {
      event.preventDefault();
      if (!validateForm(form, validators)) return;
      var selectedItem = itemPicker.getSelected();
      if (!selectedItem) return;
      setLoading(submit, true);
      rpc('saveMovement', {
        itemId: selectedItem.id,
        type: typeField.value(),
        quantity: Number(quantityField.input.value),
        documentDate: dateField.input.value,
        party: partyField.input.value.trim(),
        reference: referenceField.input.value.trim(),
        notes: notesField.input.value.trim(),
        clientRequestId: clientRequestId
      }).then(function (result) {
        dom.entityDialog.close();
        announce(typeField.value() === 'IN' ? 'تم تسجيل إدخال المخزون.' : 'تم تسجيل صرف المخزون.');
        showAuditWarning(result);
        return refreshAfterInventoryMutation();
      }).catch(function (error) {
        if (handlePossibleAuthError(error)) return;
        showFormServerError(form, error);
      }).finally(function () { setLoading(submit, false); });
    });
    openEntityDialog(presetType === 'IN' ? 'إدخال مخزون' : 'صرف مخزون', presetType === 'IN' ? 'زيادة موثّقة في الرصيد' : 'خصم موثّق من الرصيد', form, source);
    updateTypeCopy();
    renderMovementContext(movementContext, null, presetType, 0);
  }

  function createMovementTypeField(selectedType) {

    var legend = createText('legend', '', 'نوع الحركة المخزنية');

    var error = createElement('p', 'field-error');
    error.id = 'movementTypeError';
    error.setAttribute('aria-live', 'polite');
    var inputs = [];
    [
      { value: 'IN', label: 'حركة وارد (+)', help: 'إضافة إلى الرصيد', icon: 'stock-in', tone: 'in' },

    ].forEach(function (entry) {

      var input = document.createElement('input');
      input.type = 'radio';
      input.name = 'type';
      input.value = entry.value;
      input.required = true;
      input.checked = entry.value === selectedType;
      input.dataset.errorId = error.id;
      input.setAttribute('aria-describedby', error.id);
      var surface = createElement('span', 'movement-type-choice__surface');
      var copy = createElement('span', 'movement-type-choice__copy');
      append(copy, createText('strong', '', entry.label), createText('small', '', entry.help));
      append(surface, makeIcon(entry.icon), copy, createElement('span', 'movement-type-choice__check'));

  function createMovementItemPicker(items, catalogMetadata) {
    var wrap = createElement('div', 'field field--full movement-item-picker');
    var label = createText('label', '', 'الصنف');
    label.setAttribute('for', 'movementItemSearch');
    var shell = createElement('div', 'combobox-shell');
    shell.appendChild(makeIcon('search'));
    var input = document.createElement('input');
    input.id = 'movementItemSearch';
    input.name = 'itemSearch';
    input.type = 'search';
    input.required = true;
    input.autocomplete = 'off';
    input.placeholder = 'ابحث بالرمز أو اسم الصنف';
    input.setAttribute('role', 'combobox');
    input.setAttribute('aria-autocomplete', 'list');
    input.setAttribute('aria-expanded', 'false');
    input.setAttribute('aria-controls', 'movementItemListbox');
    var valueInput = document.createElement('input');
    valueInput.type = 'hidden';
    valueInput.name = 'itemId';
    valueInput.id = 'movementItemId';
    var listbox = createElement('div', 'combobox-listbox');
    listbox.id = 'movementItemListbox';
    listbox.setAttribute('role', 'listbox');
    listbox.hidden = true;
    var help = createText('p', 'field-help', catalogMetadata && catalogMetadata.truncated
      ? 'اكتب جزءاً من الاسم أو الرمز للبحث في كل الأصناف، ثم اختر نتيجة واحدة.'
      : 'اكتب جزءاً من الاسم أو الرمز، ثم اختر نتيجة واحدة.');
    help.id = 'movementItemSearchHelp';
    var error = createElement('p', 'field-error');
    error.id = 'movementItemSearchError';
    error.setAttribute('aria-live', 'polite');
    input.dataset.errorId = error.id;
    input.setAttribute('aria-describedby', help.id + ' ' + error.id);
    append(shell, input, listbox);
    append(wrap, label, shell, valueInput, help, error);

    var entries = items.map(function (item, index) {
      var itemLabel = (item.name || item.code || 'صنف غير مسمى') + (item.code ? ' — ' + item.code : '');
      return {
        item: item,
        index: index,
        label: itemLabel,
        searchText: searchable([item.code, item.name, item.owner, item.unit, itemLabel])
      };
    });
    var filtered = [];
    var activeIndex = -1;
    var selected = null;
    var selectedEntry = null;
    var changeHandler = function () {};
    var remoteTimer = 0;
    var remoteRequestId = 0;
    var catalogTruncated = !!(catalogMetadata && catalogMetadata.truncated);

    function close() {
      listbox.hidden = true;
      input.setAttribute('aria-expanded', 'false');
      input.removeAttribute('aria-activedescendant');
      activeIndex = -1;
    }

    function updateActive() {
      var options = listbox.querySelectorAll('[role="option"]');
      Array.prototype.forEach.call(options, function (option, index) {
        option.classList.toggle('is-active', index === activeIndex);
      });
      if (activeIndex >= 0 && options[activeIndex]) {
        input.setAttribute('aria-activedescendant', options[activeIndex].id);
        options[activeIndex].scrollIntoView({ block: 'nearest' });
      } else input.removeAttribute('aria-activedescendant');
    }

    function selectEntry(entry) {
      window.clearTimeout(remoteTimer);
      remoteRequestId += 1;
      selected = entry.item;
      selectedEntry = entry;
      valueInput.value = selected.id;
      input.value = entry.label;
      input.removeAttribute('aria-invalid');
      setFieldError(input, '');
      close();
      changeHandler(selected);
      input.focus({ preventScroll: true });
    }

    function renderOptionRows(nextEntries) {
      clearNode(listbox);
      filtered = nextEntries.slice(0, ITEM_PICKER_LIMIT);
      activeIndex = filtered.length ? 0 : -1;
      if (!filtered.length) {
        var empty = createText('div', 'combobox-empty', 'لا توجد أصناف مطابقة. جرّب رمزاً أو اسماً آخر.');
        empty.setAttribute('role', 'presentation');
        listbox.appendChild(empty);
      } else {
        filtered.forEach(function (entry, index) {
          var option = createElement('button', 'combobox-option');
          option.type = 'button';
          option.id = 'movementItemOption' + entry.index;
          option.setAttribute('role', 'option');
          option.setAttribute('aria-selected', selected && selected.id === entry.item.id ? 'true' : 'false');
          option.tabIndex = -1;
          var identity = createElement('span', 'combobox-option__identity');
          append(identity, createText('strong', '', entry.item.name || entry.item.code || 'صنف غير مسمى'), createText('span', '', (entry.item.code || 'بدون رمز') + (entry.item.owner ? ' · ' + entry.item.owner : '')));
          var balance = createText('span', 'combobox-option__balance mono', formatNumber(itemQuantity(entry.item)) + (entry.item.unit ? ' ' + entry.item.unit : ''));
          append(option, identity, balance, stockStatusBadge(entry.item));
          option.addEventListener('pointerdown', function (event) { event.preventDefault(); });
          option.addEventListener('click', function () { selectEntry(entry); });
          listbox.appendChild(option);
          void index;
        });
      }
      listbox.removeAttribute('aria-busy');
      listbox.hidden = false;
      input.setAttribute('aria-expanded', 'true');
      updateActive();
    }

    function scheduleRemoteSearch(queryText) {
      window.clearTimeout(remoteTimer);
      if (!catalogTruncated || !queryText) return;
      remoteTimer = window.setTimeout(function () {
        var requestId = ++remoteRequestId;
        listbox.setAttribute('aria-busy', 'true');
        var loading = createText('div', 'combobox-loading', 'جارٍ البحث في كل الأصناف…');
        loading.setAttribute('role', 'presentation');
        listbox.appendChild(loading);
        rpc('listItems', { query: queryText, status: 'ACTIVE', page: 1, pageSize: ITEM_PICKER_LIMIT }).then(function (data) {
          if (requestId !== remoteRequestId || input.value.trim() !== queryText) return;
          var rows = normalizeCollection(data, 'items');
          var remoteEntries = rows.map(function (item, index) {
            var itemLabel = (item.name || item.code || 'صنف غير مسمى') + (item.code ? ' — ' + item.code : '');
            return {
              item: item,
              index: 'Remote' + index,
              label: itemLabel,
              searchText: searchable([item.code, item.name, item.owner, item.unit, itemLabel])
            };
          });
          renderOptionRows(remoteEntries);
          announce('نتائج بحث الأصناف: ' + formatNumber(remoteEntries.length));
        }).catch(function (error) {
          if (requestId !== remoteRequestId || handlePossibleAuthError(error)) return;
          listbox.removeAttribute('aria-busy');
          var loadingNode = listbox.querySelector('.combobox-loading');
          if (loadingNode) loadingNode.remove();
          if (!filtered.length) listbox.appendChild(createText('div', 'combobox-empty', 'تعذّر البحث في بقية الأصناف. حاول مرة أخرى.'));
        });
      }, 250);
    }

    function renderOptions() {
      var queryText = input.value.trim();
      if (selectedEntry && selected && queryText === selectedEntry.label) {
        window.clearTimeout(remoteTimer);
        remoteRequestId += 1;
        var remainingEntries = entries.filter(function (entry) { return entry.item.id !== selected.id; }).slice(0, ITEM_PICKER_LIMIT - 1);
        renderOptionRows([selectedEntry].concat(remainingEntries));
        return;
      }
      var query = searchable([queryText]);
      var localEntries = entries.filter(function (entry) { return !query || entry.searchText.indexOf(query) !== -1; }).slice(0, ITEM_PICKER_LIMIT);
      renderOptionRows(localEntries);
      scheduleRemoteSearch(queryText);
    }

    input.addEventListener('focus', renderOptions);
    input.addEventListener('input', function () {
      remoteRequestId += 1;
      selected = null;
      selectedEntry = null;
      valueInput.value = '';
      changeHandler(null);
      renderOptions();
    });
    input.addEventListener('keydown', function (event) {
      if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
        event.preventDefault();
        if (listbox.hidden) renderOptions();
        if (!filtered.length) return;
        activeIndex = event.key === 'ArrowDown' ? Math.min(filtered.length - 1, activeIndex + 1) : Math.max(0, activeIndex - 1);
        updateActive();
      } else if (event.key === 'Enter' && !listbox.hidden && activeIndex >= 0) {
        event.preventDefault();
        selectEntry(filtered[activeIndex]);
      } else if (event.key === 'Escape') {
        event.preventDefault();
        close();
      }
    });
    input.addEventListener('blur', function () { window.setTimeout(close, 120); });
    return {
      wrap: wrap,
      input: input,
      valueInput: valueInput,
      getSelected: function () { return selected; },
      onChange: function (handler) { changeHandler = handler || function () {}; }
    };
  }

  function renderMovementContext(container, item, type, quantity) {
    clearNode(container);
    if (!item) {
      var prompt = createElement('div', 'movement-context__empty');
      append(prompt, makeIcon('search'), createText('p', '', 'اختر صنفاً لعرض وحدته ورصيده قبل الترحيل وبعده.'));
      container.appendChild(prompt);
      return;
    }
    var before = itemQuantity(item);
    var change = type === 'OUT' ? -Math.abs(quantity) : Math.abs(quantity);
    var after = before + change;
    var unit = item.unit || '';
    var heading = createElement('div', 'movement-context__heading');
    var identity = createElement('div');
    append(identity, createText('strong', '', item.name || item.code || 'صنف غير مسمى'), createText('span', 'muted', (item.code || 'بدون رمز') + (unit ? ' · ' + unit : '')));
    append(heading, identity, stockStatusBadge(item));
    var facts = createElement('dl', 'movement-context__facts');
    [
      { label: 'الرصيد الحالي', value: formatNumber(before) + (unit ? ' ' + unit : '') },
      { label: 'حد إعادة الطلب', value: formatNumber(item.reorderLevel || 0) + (unit ? ' ' + unit : '') },
      { label: 'المالك', value: item.owner || 'غير محدد' }
    ].forEach(function (fact) {
      var row = document.createElement('div');
      append(row, createText('dt', '', fact.label), createText('dd', 'mono', fact.value));
      facts.appendChild(row);
    });
    var preview = createElement('div', 'balance-preview' + (after < 0 ? ' balance-preview--invalid' : ''));
    preview.setAttribute('dir', 'ltr');
    var beforeBox = createElement('span', 'balance-preview__value');
    append(beforeBox, createText('small', '', 'الحالي'), createText('strong', 'mono', formatNumber(before)));
    var operator = createText('span', 'balance-preview__operator balance-preview__operator--' + (type === 'OUT' ? 'out' : 'in'), (type === 'OUT' ? '− ' : '+ ') + formatNumber(quantity || 0));
    var afterBox = createElement('span', 'balance-preview__value');
    append(afterBox, createText('small', '', 'بعد الترحيل'), createText('strong', 'mono', formatNumber(after)));
    append(preview, beforeBox, operator, afterBox);
    append(container, heading, facts, preview);
    if (after < 0) container.appendChild(createText('p', 'movement-context__warning', 'الرصيد غير كافٍ؛ لا يمكن ترحيل هذا الصرف.'));
    else if (quantity > 0) {
      var projected = itemStatus({ currentQuantity: after, reorderLevel: item.reorderLevel, active: true });
      var statusLine = createElement('div', 'movement-context__projected');
      append(statusLine, createText('span', '', 'الحالة المتوقعة:'), statusShape(projected), createText('strong', '', projected.label));
      container.appendChild(statusLine);
    }
  }

  function prefillCorrectedMovement(movement) {
    var item = state.catalogItems.find(function (entry) {
      return String(entry.id) === String(movement.itemId) || String(entry.code) === String(movement.itemCode);
    });
    var ready = item ? Promise.resolve([item]) : rpc('listItems', { query: movement.itemCode || movement.itemName || '', status: 'ACTIVE', page: 1, pageSize: 12 }).then(function (data) {
      return normalizeCollection(data, 'items');
    });
    return ready.then(function (items) {
      populateQuickMovementItems(items);
      item = items.find(function (entry) {
        return String(entry.id) === String(movement.itemId) || String(entry.code) === String(movement.itemCode);
      }) || items[0];
      dom.quickMovementTypeOut.checked = String(movement.type || '').toUpperCase() === 'OUT';
      dom.quickMovementTypeIn.checked = !dom.quickMovementTypeOut.checked;
      dom.quickMovementSearch.value = movement.itemCode || movement.itemName || '';
      dom.quickMovementItem.value = item ? item.id : '';
      dom.quickMovementQuantity.value = movement.quantity || '';
      dom.quickMovementDate.value = movement.documentDate ? String(movement.documentDate).slice(0, 10) : localDateKey(new Date());
      dom.quickMovementParty.value = movement.party || '';
      dom.quickMovementReference.value = movement.reference || '';
      dom.quickMovementNotes.value = 'تصحيح للحركة ' + (movement.id || '') + (movement.notes ? ' — ' + movement.notes : '');
      state.quickMovementClientRequestId = newClientRequestId();
      dom.quickMovementCancelCorrection.hidden = false;
      updateQuickMovementType();
      dom.operationRail.scrollIntoView({ behavior: 'smooth', block: 'start' });
      window.setTimeout(function () { dom.quickMovementQuantity.focus({ preventScroll: true }); }, 250);

  function copyCredentials() {
    if (!state.credentials) return;
    var text = 'اسم المستخدم: ' + state.credentials.username + '\nكلمة المرور المؤقتة: ' + state.credentials.password;
    var promise;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      promise = navigator.clipboard.writeText(text);
    } else {
      promise = new Promise(function (resolve, reject) {
        var area = document.createElement('textarea');
        area.value = text;
        area.setAttribute('readonly', '');
        area.className = 'sr-only';
        document.body.appendChild(area);
        area.select();
        try { document.execCommand('copy') ? resolve() : reject(new Error('copy failed')); }
        catch (error) { reject(error); }
        document.body.removeChild(area);
      });
    }
    promise.then(function () {
      dom.credentialsCopyStatus.textContent = 'تم نسخ بيانات الدخول.';
      var label = dom.copyCredentialsButton.querySelector('.button__label');
      if (label) {

  function openAdministrativeReport(source) {
    if (!state.user) return;
    state.dialogReturnFocus = source || document.activeElement;
    state.administrativeReport = null;
    dom.administrativeReportPrint.disabled = true;
    clearNode(dom.administrativeReportContent);
    renderLoading(dom.administrativeReportState);
    if (!dom.administrativeReportDialog.open) dom.administrativeReportDialog.showModal();
    rpc('getInventoryReport', currentInventoryReportParams()).then(function (report) {
      state.administrativeReport = report || {};
      clearNode(dom.administrativeReportState);
      renderAdministrativeReport(state.administrativeReport);
      dom.administrativeReportPrint.disabled = !normalizeCollection(report, 'items').length;
      if (!normalizeCollection(report, 'items').length) {
        renderEmpty(dom.administrativeReportState, 'items', 'لا توجد أصناف تطابق مرشحات التقرير الحالية.');
      }
    }).catch(function (error) {
      if (handlePossibleAuthError(error)) return;
      renderError(dom.administrativeReportState, error.message || 'تعذّر تجهيز التقرير الإداري.', function () { openAdministrativeReport(source); });
    });
  }

  function appendAdministrativeFact(container, label, value) {
    var row = document.createElement('div');
    append(row, createText('dt', '', label), createText('dd', '', value === undefined || value === null || value === '' ? '—' : value));
    container.appendChild(row);

  function buildAdministrativeTable(headers, rows, numericColumns) {
    var frame = createElement('div', 'administrative-report__table-frame');
    var table = document.createElement('table');
    var head = document.createElement('thead');
    var headRow = document.createElement('tr');
    headers.forEach(function (header) { headRow.appendChild(createText('th', '', header)); });
    head.appendChild(headRow);
    var body = document.createElement('tbody');
    if (!rows.length) {
      var emptyRow = document.createElement('tr');
      var emptyCell = createText('td', 'administrative-report__empty', 'لا توجد بيانات لعرضها.');
      emptyCell.colSpan = headers.length;
      emptyRow.appendChild(emptyCell);
      body.appendChild(emptyRow);
    } else {
      rows.forEach(function (row) {
        var tr = document.createElement('tr');
        row.forEach(function (value, index) {
          var cell = createText('td', numericColumns.indexOf(index) !== -1 ? 'mono number' : '', numericColumns.indexOf(index) !== -1 ? formatNumber(value) : value);
          tr.appendChild(cell);
        });
        body.appendChild(tr);
      });
    }
    append(table, head, body);
    frame.appendChild(table);
    return frame;
  }

  function currentMovementReportFilters() {
    var typeLabels = { '': 'كل الأنواع', IN: 'إدخال', OUT: 'صرف', REVERSAL: 'عكس' };
    var params = state.movementReportParams || {
      query: dom.movementQuery.value.trim(),
      type: dom.movementTypeFilter.value,
      owner: dom.movementOwnerFilter.value,
      itemLabel: 'كل الأصناف',
      dateFrom: dom.movementDateFrom.value,
      dateTo: dom.movementDateTo.value
    };
    return [
      ['نوع الحركة', typeLabels[params.type] || params.type],
      ['الصنف', params.itemLabel || 'كل الأصناف'],
      ['المالك', params.owner || 'كل المالكين'],
      ['من تاريخ', params.dateFrom || 'غير محدد'],
      ['إلى تاريخ', params.dateTo || 'غير محدد'],
      ['البحث', params.query || 'بدون عبارة بحث']
    ];
  }

  function numericExportValue(value) {
    var number = Number(value);
    return isFinite(number) ? number : 0;
  }

  function optionalNumericExportValue(value) {
    if (value === null || value === undefined || value === '') return '';
    return numericExportValue(value);
  }

  function downloadBlob(blob, fileName) {
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    window.setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function pdfText(doc, tag, text, className) {
    var element = doc.createElement(tag);
    if (className) element.className = className;
    element.textContent = text === null || text === undefined ? '' : String(text);
    return element;
  }

  function pdfMetaEntry(doc, container, label, value) {

  function handleSearchKeydown(event) {
    if (event.key === 'Escape') {

      if (state.searchIndex >= 0) activateSearchResult(state.searchIndex);

    event.preventDefault();

    updateSearchActiveDescendant();

  function createField(config) {
    var wrap = createElement('div', 'field' + (config.full ? ' field--full' : ''));
    var label = createText('label', '', config.label);

      input = document.createElement('select');

        var option = document.createElement('option');

        option.textContent = entry.label;
        input.appendChild(option);
      });
    } else if (config.type === 'textarea') {
      input = document.createElement('textarea');
    } else {
      input = document.createElement('input');
      input.type = config.type || 'text';
    }
    input.id = config.id;
    input.name = config.name;
    if (config.required) input.required = true;

    if (config.minLength !== undefined) input.minLength = config.minLength;

    error.setAttribute('aria-live', 'polite');

      else if (input.validity.rangeUnderflow) message = 'القيمة أقل من الحد المسموح.';
      else if (input.validity.rangeOverflow) message = 'القيمة أكبر من الحد المسموح.';
      else if (input.validity.badInput || input.validity.typeMismatch) message = 'أدخل قيمة صالحة.';

    } else if (options.time && options.value) {
      var time = createText('time', '', content);
      time.dateTime = String(options.value);
      if (options.title) time.title = options.title;
      cell.appendChild(time);
    } else {
      var span = createText('span', options.mono || options.code ? 'mono' : '', content);
      if (options.code) span.setAttribute('data-code', '');
      if (options.auto) span.setAttribute('dir', 'auto');
      cell.appendChild(span);
    }
    row.appendChild(cell);
    return cell;
  }

  function firstDefined(object, keys) {
    for (var i = 0; i < keys.length; i += 1) {
      if (object && object[keys[i]] !== undefined && object[keys[i]] !== null) return object[keys[i]];
    }
    return undefined;
  }

  function metricValue(value) {
    return Array.isArray(value) ? value.length : value;
  }

  function sum(values) {
    return values.reduce(function (total, value) { return total + (Number(value) || 0); }, 0);
  }

  function formatNumber(value) {
    var number = Number(value);
    if (!isFinite(number)) return '—';
    try { return new Intl.NumberFormat('ar', { maximumFractionDigits: 6 }).format(number); }
    catch (ignored) { return String(number); }
  }

  function formatOptionalNumber(value) {
    if (value === null || value === undefined || value === '') return '—';
    return formatNumber(value);
  }

  function formatSignedNumber(value) {
    var number = Number(value);
    if (!isFinite(number) || number === 0) return formatNumber(0);
    return (number > 0 ? '+' : '−') + formatNumber(Math.abs(number));
  }

  function formatDate(value, includeTime) {
    if (!value) return '—';
    var text = String(value);
    var date = /^\d{4}-\d{2}-\d{2}$/.test(text) ? new Date(text + 'T12:00:00') : new Date(value);
    if (isNaN(date.getTime())) return text;
    try {
      return new Intl.DateTimeFormat('ar-PS', includeTime ? { dateStyle: 'medium', timeStyle: 'short' } : { dateStyle: 'medium' }).format(date);
    } catch (ignored) { return date.toLocaleString('ar'); }
  }

  function formatBytes(value) {
    var bytes = Number(value);
    if (!isFinite(bytes) || bytes < 0) return '—';
    if (bytes < 1024) return formatNumber(bytes) + ' بايت';
    if (bytes < 1024 * 1024) return formatNumber(bytes / 1024) + ' كيلوبايت';
    return formatNumber(bytes / (1024 * 1024)) + ' ميغابايت';
  }

  function fileDateStamp() {
    var now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  }

  function newClientRequestId() {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
    var randomPart = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
    return 'req-' + Date.now().toString(36) + '-' + randomPart;
  }

  function searchable(values) {
    return values.filter(function (value) { return value !== null && value !== undefined; }).join(' ').toLocaleLowerCase('ar');
  }

  function dedupeById(rows) {
    var seen = {};
    return rows.filter(function (row) {
      var key = row && row.id ? row.id : JSON.stringify(row);
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });
  }
})();
</script>
