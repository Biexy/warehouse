<script>
(function () {
  'use strict';

  var SESSION_KEY = 'warehouse.session.same-tab.v2';
  var state = {
    token: '', user: null, permissions: {}, dashboard: null, passwordChangeRequired: false,
    items: [], itemPage: 1, itemPageSize: 20, itemTotal: 0, owners: [],
    movements: [], movementPage: 1, movementPageSize: 25, movementTotal: 0,
    catalog: [], correctionCatalog: [], editingItem: null, editingMovement: null, activeItem: null,
    users: [], stockChart: null, requestIds: Object.create(null),
    catalogImportCompleted: false, itemEditReturnFocus: null, movementCorrectionReturnFocus: null, reportReturnFocus: null,
    activeTab: 'dashboard'
  };

  function el(id) { return document.getElementById(id); }
  function esc(value) { return String(value == null ? '' : value).replace(/[&<>"']/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function fmt(value) { return new Intl.NumberFormat('ar-EG', { maximumFractionDigits: 6 }).format(Number(value) || 0); }
  function roleName(role) { return ({ADMIN:'مدير النظام',STOREKEEPER:'أمين مخزن',AUDITOR:'مدقق'})[role] || role; }
  function movementName(type) { return ({IN:'وارد',OUT:'صادر',REVERSAL:'عكس'})[type] || type; }
  function today() { return new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 10); }
  function newRequestId(prefix) { return (prefix || 'REQ') + '-' + Date.now() + '-' + Math.random().toString(36).slice(2) + '-' + Math.random().toString(36).slice(2); }
  function debounce(fn, wait) { var timer; return function () { var args = arguments; clearTimeout(timer); timer = setTimeout(function () { fn.apply(null, args); }, wait); }; }

  function rpc(name) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function (resolve, reject) {
      if (!window.google || !google.script || !google.script.run) return reject({ code: 'PREVIEW_UNAVAILABLE', message: 'واجهة الخادم غير متاحة في هذه المعاينة.' });
      var runner = google.script.run.withSuccessHandler(function (result) {
        if (result && result.ok) return resolve(result.data);
        var error = result && result.error || { code: 'INTERNAL_ERROR', message: 'تعذر إتمام الطلب.' };
        if (['SESSION_EXPIRED', 'INVALID_SESSION', 'SESSION_INVALIDATED', 'AUTH_REQUIRED'].indexOf(error.code) !== -1) clearSession(true);
        reject(error);
      }).withFailureHandler(function () { reject({ code: 'NETWORK_ERROR', message: 'تعذر الاتصال بالخادم. حاول مجدداً.' }); });
      runner[name].apply(runner, args);
    });
  }

  function busy(button, active, label) {
    if (!button) return;
    if (active) { button.dataset.label = button.innerHTML; button.disabled = true; button.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ' + (label || 'جارٍ التنفيذ…'); }
    else { button.disabled = false; if (button.dataset.label) button.innerHTML = button.dataset.label; }
  }

  function showToast(message, type) {
    var toast = document.createElement('div');
    var color = type === 'error' ? 'border-brand-crimson text-brand-crimson' : type === 'warning' ? 'border-brand-amber text-brand-amber' : 'border-brand-emerald text-brand-emerald';
    toast.className = 'bg-brand-darkBlue border ' + color + ' px-4 py-3 rounded-xl shadow-2xl text-xs font-bold max-w-sm transition-all';
    toast.textContent = message;
    el('toastContainer').appendChild(toast);
    setTimeout(function () { toast.remove(); }, 4200);
  }

  function showError(target, error) {
    var node = typeof target === 'string' ? el(target) : target;
    if (node) { node.textContent = error && error.message || 'تعذر إتمام الطلب.'; node.classList.remove('hidden'); }
    else showToast(error && error.message || 'تعذر إتمام الطلب.', 'error');
  }

  function setSyncStatus(connected, isError) {
    var dot = el('syncStatusDot'), label = el('syncStatusLabel'); if (!dot || !label) return;
    dot.className = 'relative inline-flex rounded-full h-2 w-2 ' + (isError ? 'bg-brand-crimson' : connected ? 'bg-brand-emerald' : 'bg-brand-amber');
    label.textContent = isError ? 'تعذر الاتصال بالنظام' : connected ? 'متصل ومزامن مع النظام' : 'جارٍ المزامنة…';
  }

  function clearSession(showLogin) {
    try { sessionStorage.removeItem(SESSION_KEY); } catch (ignored) {}
    state.token = ''; state.user = null; state.passwordChangeRequired = false;
    el('loginAuthModal').classList.add('hidden'); el('passwordChangeForm').reset(); el('passwordChangeError').classList.add('hidden');
    el('warehouseApp').classList.add('hidden'); el('startupState').classList.add('hidden');
    if (showLogin !== false) el('loginView').classList.remove('hidden');
  }

  async function validateOrLogin() {
    var token = ''; try { token = sessionStorage.getItem(SESSION_KEY) || ''; } catch (ignored) {}
    if (!token) return clearSession(true);
    el('loginView').classList.add('hidden'); el('startupState').classList.remove('hidden'); state.token = token;
    try { await bootstrap(); el('startupState').classList.add('hidden'); }
    catch (error) {
      if (!state.token) return;
      showBootstrapFailure_(error);
    }
  }

  async function bootstrap() {
    var data = await rpc('getBootstrap', state.token);
    state.user = data.user; state.permissions = data.permissions || {}; state.dashboard = data.dashboard; state.catalog = data.items || []; state.owners = data.owners || [];
    state.catalogImportCompleted = Boolean(data.settings && data.settings.catalogImportCompleted);
    el('userSelector').textContent = data.user.displayName + ' — ' + roleName(data.user.role);
    el('activeOperatorBadge').textContent = data.user.displayName;
    el('adminUsersButton').classList.toggle('hidden', !state.permissions.canManageUsers);
    el('backupButton').classList.toggle('hidden', !state.permissions.canCreateBackups);
    var isAdministrator = data.user.role === 'ADMIN';
    el('adminTabButton').classList.toggle('hidden', !isAdministrator);
    el('workspaceTabList').classList.toggle('workspace-tabs--admin', isAdministrator);
    el('newItemForm').parentElement.classList.toggle('hidden', !state.permissions.canManageItems);
    el('trxForm').parentElement.classList.toggle('hidden', !state.permissions.canCreateMovements);
    updateCatalogImportVisibility();
    el('warehouseApp').classList.remove('hidden'); el('loginView').classList.add('hidden');
    switchWorkspaceTab(workspaceTabFromLocation(), { replace: true, scroll: false });
    populateOwners(); populateCatalog(state.catalog); setDefaultTrxDate(); applyDashboard(data.dashboard); setSyncStatus(true);
    state.passwordChangeRequired = Boolean(data.passwordChangeRequired);
    if (state.passwordChangeRequired) { showPasswordChangeModal_(true); return; }
    el('loginAuthModal').classList.add('hidden');
    await Promise.all([loadItems(), loadMovements()]);
  }

  async function handleLogin(event) {
    event.preventDefault(); var button = el('loginSubmit'); el('loginError').classList.add('hidden'); busy(button, true, 'جارٍ التحقق…');
    var result;
    try {
      result = await rpc('authenticate', { username: el('loginUsername').value.trim(), password: el('loginPassword').value });
    } catch (error) {
      showError('loginError', error); busy(button, false); return;
    }
    state.token = result.token;
    try { sessionStorage.setItem(SESSION_KEY, result.token); } catch (ignored) { showToast('تم الدخول، لكن المتصفح لم يسمح بحفظ الجلسة بعد إغلاق الصفحة.', 'warning'); }
    el('loginPassword').value = ''; el('loginView').classList.add('hidden'); showBootstrapLoading_();
    try { await bootstrap(); el('startupState').classList.add('hidden'); }
    catch (error) { if (state.token) showBootstrapFailure_(error); }
    finally { busy(button, false); }
  }

  function showBootstrapLoading_() {
    el('startupState').classList.remove('hidden');
    el('startupSpinner').classList.remove('hidden');
    el('startupMessage').textContent = 'جارٍ التحقق من الجلسة وتحميل البيانات…';
    el('startupErrorCode').textContent = '';
    el('startupErrorCode').classList.add('hidden');
    el('startupActions').classList.add('hidden');
  }
  function showBootstrapFailure_(error) {
    el('warehouseApp').classList.add('hidden'); el('loginView').classList.add('hidden'); el('startupState').classList.remove('hidden');
    el('startupSpinner').classList.add('hidden');
    el('startupMessage').textContent = 'تم تسجيل الدخول بنجاح، لكن تعذر تحميل بيانات المخزون. أعد المحاولة دون إدخال كلمة المرور مرة أخرى.';
    el('startupErrorCode').textContent = (error && error.message ? error.message : 'تعذر تحميل البيانات.') + (error && error.code ? ' · ' + error.code : '');
    el('startupErrorCode').classList.remove('hidden'); el('startupActions').classList.remove('hidden');
  }
  async function retryBootstrap() {
    if (!state.token) return clearSession(true);
    showBootstrapLoading_();
    try { await bootstrap(); el('startupState').classList.add('hidden'); }
    catch (error) { if (state.token) showBootstrapFailure_(error); }
  }
  function loginWithAnotherAccount() { handleLogout(); }

  async function handleLogout() {
    var token = state.token; clearSession(true); if (token) try { await rpc('logout', token); } catch (ignored) {}
  }

  async function confirmUserSwitch(event) {
    event.preventDefault(); var errorNode = el('passwordChangeError'); errorNode.classList.add('hidden');
    if (el('newPasswordInput').value !== el('confirmPasswordInput').value) return showError(errorNode, { message: 'كلمتا المرور الجديدتان غير متطابقتين.' });
    var button = el('passwordChangeSubmit'); busy(button, true, 'جارٍ الحفظ…');
    try {
      await rpc('changeMyPassword', state.token, { currentPassword: el('authPasswordInput').value, newPassword: el('newPasswordInput').value });
      el('loginAuthModal').classList.add('hidden'); showToast('تم تغيير كلمة المرور. سجّل الدخول مجدداً.', 'success'); clearSession(true);
    } catch (error) { showError(errorNode, error); } finally { busy(button, false); }
  }

  function showPasswordChangeModal_(required) {
    state.passwordChangeRequired = Boolean(required);
    el('passwordChangeForm').reset(); el('passwordChangeError').classList.add('hidden');
    el('loginTargetUserLabel').textContent = required ? 'غيّر كلمة المرور المؤقتة قبل متابعة العمل.' : 'استخدم كلمة المرور الحالية لتعيين كلمة مرور جديدة.';
    el('passwordChangeCancelButton').textContent = required ? 'خروج' : 'إلغاء';
    el('loginAuthModal').classList.remove('hidden'); el('authPasswordInput').focus();
  }
  function openPasswordChangeModal() { showPasswordChangeModal_(false); }
  function cancelPasswordChange() {
    if (state.passwordChangeRequired) return handleLogout();
    el('loginAuthModal').classList.add('hidden'); el('passwordChangeForm').reset(); el('passwordChangeError').classList.add('hidden');
  }

  function applyDashboard(dashboard) {
    if (!dashboard) return;
    var summary = dashboard.summary || dashboard;
    el('kpiTotalItems').textContent = fmt(summary.totalItems || dashboard.totalItems);
    el('kpiTotalIn').textContent = fmt(summary.incomingQuantity || dashboard.incomingQuantity);
    el('kpiTotalOut').textContent = fmt(summary.outgoingQuantity || dashboard.outgoingQuantity);
    el('kpiCriticalItems').textContent = fmt(summary.actionNeededCount || dashboard.actionNeededCount);
    renderOwnerSummary(dashboard.ownerSummary || []); renderChartVisualization(dashboard.stockLevelSeries || dashboard.stockSeries || dashboard.urgentItems || []);
  }

  function populateOwners() {
    var select = el('itemOwnerFilter'), current = select.value;
    select.innerHTML = '<option value="">جميع الجهات</option>' + state.owners.map(function (owner) { return '<option value="' + esc(owner) + '">' + esc(owner) + '</option>'; }).join('');
    select.value = current;
  }

  function updateCatalogImportVisibility() {
    var button = el('catalogImportButton');
    if (!button) return;
    button.classList.toggle('hidden', !state.permissions.canManageItems || state.catalogImportCompleted);
  }

  function itemFilters() { return { query: el('itemSearchInput').value.trim(), owner: el('itemOwnerFilter').value, status: el('itemStatusFilter').value, page: state.itemPage, pageSize: state.itemPageSize }; }
  async function loadItems() {
    setSyncStatus(false); el('inventoryTableBody').innerHTML = '<tr><td colspan="8" class="loading-row table-state-cell"><i class="fa-solid fa-circle-notch fa-spin ml-2"></i>جارٍ تحميل الأرصدة…</td></tr>';
    try { var data = await rpc('listItems', state.token, itemFilters()); state.items = data.items || []; state.itemTotal = data.total || 0; state.owners = data.owners || state.owners; populateOwners(); renderInventoryTable(state.items); renderPagination('itemsPagination', state.itemPage, state.itemPageSize, state.itemTotal, changeItemPage); setSyncStatus(true); return true; }
    catch (error) { el('inventoryTableBody').innerHTML = '<tr><td colspan="8" class="error-row table-state-cell">' + esc(error.message) + ' <button onclick="filterItemsTable()" class="underline text-brand-neon">إعادة المحاولة</button></td></tr>'; setSyncStatus(false, true); return false; }
  }

  function renderInventoryTable(items) {
    var body = el('inventoryTableBody');
    if (!items.length) { body.innerHTML = '<tr><td colspan="8" class="empty-row table-state-cell">لا توجد أصناف مطابقة للفلاتر الحالية.</td></tr>'; return; }
    body.innerHTML = items.map(function (item) {
      var status = item.stockStatus === 'INACTIVE' ? 'موقوف' : item.stockStatus === 'OUT' ? 'نافد' : item.stockStatus === 'LOW' ? 'مخزون منخفض' : 'متوفر';
      var statusClass = item.stockStatus === 'OK' ? 'text-brand-emerald bg-brand-emerald/10' : item.stockStatus === 'INACTIVE' ? 'text-gray-400 bg-gray-700/30' : 'text-brand-crimson bg-brand-crimson/10';
      var itemLabel = esc(item.name || item.code);
      var actions = '<button type="button" onclick="event.stopPropagation();openItemDetailModal(\'' + esc(item.id) + '\')" class="table-action-button text-brand-neon hover:bg-brand-neon/10" aria-label="عرض بطاقة ' + itemLabel + '"><i class="fa-solid fa-eye" aria-hidden="true"></i><span>عرض</span></button>';
      if (state.permissions.canManageItems) actions += '<button type="button" onclick="event.stopPropagation();editItem(\'' + esc(item.id) + '\')" class="table-action-button text-brand-amber hover:bg-brand-amber/10" aria-label="تعديل ' + itemLabel + '"><i class="fa-solid fa-pen" aria-hidden="true"></i><span>تعديل</span></button><button type="button" onclick="event.stopPropagation();deleteItem(\'' + esc(item.id) + '\')" class="table-action-button text-brand-crimson hover:bg-brand-crimson/10" aria-label="إيقاف ' + itemLabel + '"><i class="fa-solid fa-ban" aria-hidden="true"></i><span>إيقاف</span></button>';
      return '<tr class="border-b border-gray-800/40 hover:bg-brand-darkBlue/20 cursor-pointer" onclick="openItemDetailModal(\'' + esc(item.id) + '\')"><td data-label="الكود" class="inventory-code font-bold text-brand-neon">' + esc(item.code) + '</td><td class="inventory-primary text-white font-medium">' + esc(item.name) + '<span class="inventory-meta">' + esc(item.owner || 'غير محدد') + ' · ' + esc(item.unit || '') + '</span></td><td data-label="الافتتاحي" class="inventory-number text-center text-gray-400">' + fmt(item.openingQuantity) + '</td><td data-label="الوارد" class="inventory-number text-center text-brand-emerald">+' + fmt(item.totalIncoming) + '</td><td data-label="الصادر" class="inventory-number text-center text-brand-crimson">-' + fmt(item.totalOutgoing) + '</td><td data-label="الرصيد الحالي" class="inventory-number text-center font-extrabold text-white">' + fmt(item.currentQuantity) + '</td><td data-label="الحالة" class="text-center"><span class="px-2.5 py-1 rounded-full text-[10px] font-bold ' + statusClass + '">' + status + '</span></td><td data-label="الإجراءات" class="card-span-full"><div class="table-actions">' + actions + '</div></td></tr>';
    }).join('');
  }

  function renderPagination(id, page, pageSize, total, callback) {
    var pages = Math.max(1, Math.ceil(total / pageSize)), node = el(id);
    node.innerHTML = '<button class="bg-gray-800 px-3 py-1.5 rounded-lg text-xs disabled:opacity-40" ' + (page <= 1 ? 'disabled' : '') + '>السابق</button><span class="text-xs text-gray-400">صفحة ' + page + ' من ' + pages + ' — ' + total + '</span><button class="bg-gray-800 px-3 py-1.5 rounded-lg text-xs disabled:opacity-40" ' + (page >= pages ? 'disabled' : '') + '>التالي</button>';
    node.children[0].onclick = function () { callback(page - 1); }; node.children[2].onclick = function () { callback(page + 1); };
  }
  function changeItemPage(page) { state.itemPage = page; loadItems(); }
  function changeItemPageSize(value) {
    var pageSize = Number(value);
    if ([20, 50, 100].indexOf(pageSize) === -1 || pageSize === state.itemPageSize) return;
    state.itemPageSize = pageSize; state.itemPage = 1; loadItems();
  }
  function filterItemsTable() { state.itemPage = 1; debouncedItems(); }
  var debouncedItems = debounce(loadItems, 300);

  function movementFilters(exportAll) { return { query: el('auditSearchInput').value.trim(), type: el('auditTypeFilter').value, dateFrom: el('auditDateFrom').value, dateTo: el('auditDateTo').value, page: exportAll ? 1 : state.movementPage, pageSize: exportAll ? 100 : state.movementPageSize }; }
  async function loadMovements() {
    el('auditLogsTableBody').innerHTML = '<tr><td colspan="9" class="loading-row table-state-cell">جارٍ تحميل سجل التدقيق…</td></tr>';
    try { var data = await rpc('listMovements', state.token, movementFilters(false)); state.movements = data.movements || []; state.movementTotal = data.total || 0; renderAuditTrailTable(state.movements); renderPagination('movementsPagination', state.movementPage, state.movementPageSize, state.movementTotal, changeMovementPage); }
    catch (error) { el('auditLogsTableBody').innerHTML = '<tr><td colspan="9" class="error-row table-state-cell">' + esc(error.message) + '</td></tr>'; }
  }
  function changeMovementPage(page) { state.movementPage = page; loadMovements(); }
  function filterAuditTrailTable() { state.movementPage = 1; debouncedMovements(); }
  var debouncedMovements = debounce(loadMovements, 300);

  function renderAuditTrailTable(movements) {
    var body = el('auditLogsTableBody'); if (!movements.length) { body.innerHTML = '<tr><td colspan="9" class="empty-row table-state-cell">لا توجد حركات مطابقة للفلاتر الحالية.</td></tr>'; return; }
    body.innerHTML = movements.map(function (m) {
      var actions = '<button type="button" onclick="openItemDetailModal(\'' + esc(m.itemId) + '\')" class="table-action-button text-brand-neon hover:bg-brand-neon/10" aria-label="عرض بطاقة الصنف"><i class="fa-solid fa-eye" aria-hidden="true"></i><span>عرض</span></button>';
      if (state.permissions.canReverseMovements && m.type !== 'REVERSAL' && !m.reversed) actions += '<button type="button" onclick="editTrx(\'' + esc(m.id) + '\')" class="table-action-button text-brand-amber hover:bg-brand-amber/10" aria-label="تصحيح الحركة"><i class="fa-solid fa-pen" aria-hidden="true"></i><span>تصحيح</span></button><button type="button" onclick="deleteTrx(\'' + esc(m.id) + '\')" class="table-action-button text-brand-crimson hover:bg-brand-crimson/10" aria-label="عكس الحركة"><i class="fa-solid fa-rotate-left" aria-hidden="true"></i><span>عكس</span></button>';
      var badge = m.type === 'IN' ? 'text-brand-emerald' : m.type === 'OUT' ? 'text-brand-crimson' : 'text-brand-amber';
      return '<tr><td data-label="التاريخ" class="inventory-number whitespace-nowrap">' + esc(m.documentDate || String(m.timestamp).slice(0,10)) + '<div class="text-[10px] text-gray-500">' + esc(String(m.timestamp || '').replace('T',' ').slice(0,16)) + '</div></td><td data-label="المستخدم">' + esc(m.actorDisplayName || m.actor && m.actor.displayName || m.actorUsername) + '</td><td data-label="العملية" class="font-bold ' + badge + '">' + movementName(m.type) + (m.reversed ? ' (معكوسة)' : '') + '</td><td class="inventory-primary cursor-pointer text-brand-neon" onclick="openItemDetailModal(\'' + esc(m.itemId) + '\')">' + esc(m.itemName) + '<div class="text-[10px]">' + esc(m.itemCode) + '</div></td><td data-label="الكمية" class="inventory-number text-center">' + fmt(m.quantity) + '</td><td data-label="المرجع" class="text-center">' + esc(m.reference) + '</td><td data-label="الجهة">' + esc(m.party) + '</td><td data-label="الملاحظات" class="card-span-full">' + esc(m.notes || '—') + '</td><td data-label="الإجراءات" class="card-span-full"><div class="table-actions">' + actions + '</div></td></tr>';
    }).join('');
  }

  function populateCatalog(items) {
    var select = el('trxItem'), selected = select.value, previousSelected = state.catalog.find(function (item) { return item.id === selected; });
    state.catalog = (items || []).slice();
    if (previousSelected && !state.catalog.some(function (item) { return item.id === previousSelected.id; })) state.catalog.unshift(previousSelected);
    select.innerHTML = '<option value="">اختر الصنف</option>' + state.catalog.filter(function (i) { return i.active !== false; }).map(function (item) { return '<option value="' + esc(item.id) + '">' + esc(item.name) + ' (' + esc(item.code) + ')</option>'; }).join('');
    select.value = selected; updateBalancePreview();
  }

  async function searchCatalog() {
    var query = el('trxItemSearch').value.trim();
    try { var data = await rpc('listItems', state.token, { query: query, status: 'ACTIVE', page: 1, pageSize: 50 }); populateCatalog(data.items || []); return true; }
    catch (error) { showToast(error.message, 'error'); return false; }
  }
  var debouncedCatalog = debounce(searchCatalog, 250);

  function updateBalancePreview() {
    var item = state.catalog.find(function (candidate) { return candidate.id === el('trxItem').value; }); var qty = Number(el('trxQty').value) || 0; var type = document.querySelector('input[name="trxType"]:checked');
    if (!item) { el('trxCurrentBalance').textContent = '—'; el('trxProjectedBalance').textContent = '—'; return; }
    var projected = item.currentQuantity + (type && type.value === 'صادر' ? -qty : qty);
    el('trxCurrentBalance').textContent = fmt(item.currentQuantity) + ' ' + item.unit; el('trxProjectedBalance').textContent = fmt(projected) + ' ' + item.unit;
    el('trxProjectedBalance').className = projected < 0 ? 'text-brand-crimson' : 'text-brand-emerald'; el('trxSubmitBtn').disabled = projected < 0;
  }
  function setDefaultTrxDate() { el('trxDate').value = today() + 'T' + new Date().toTimeString().slice(0,5); }

  async function handleTransactionSubmit(event) {
    event.preventDefault(); var button = el('trxSubmitBtn'); var selectedType = document.querySelector('input[name="trxType"]:checked').value;
    var payload = { clientRequestId: state.requestIds.movement || (state.requestIds.movement = newRequestId('MOV')), itemId: el('trxItem').value, type: selectedType === 'وارد' ? 'IN' : 'OUT', quantity: Number(el('trxQty').value), reference: el('trxDoc').value.trim(), documentDate: el('trxDate').value.slice(0,10), party: el('trxEntity').value.trim(), notes: el('trxNotes').value.trim() };
    busy(button, true, 'جارٍ الترحيل…');
    try {
      await rpc('saveMovement', state.token, payload); showToast('تم ترحيل الحركة وتأمين الرصيد.', 'success');
      state.requestIds.movement = ''; el('trxForm').reset(); document.querySelector('input[name="trxType"][value="وارد"]').checked = true; setDefaultTrxDate(); await refreshAll();
    } catch (error) { showToast(error.message, 'error'); } finally { busy(button, false); updateBalancePreview(); }
  }

  function populateCorrectionCatalog(items, selectedId) {
    state.correctionCatalog = items || [];
    var select = el('correctionItem');
    select.innerHTML = '<option value="">اختر الصنف</option>' + state.correctionCatalog.filter(function (item) { return item.active !== false; }).map(function (item) { return '<option value="' + esc(item.id) + '">' + esc(item.name) + ' (' + esc(item.code) + ')</option>'; }).join('');
    select.value = selectedId || '';
  }

  async function searchCorrectionCatalog() {

  var WORKSPACE_TABS = ['dashboard', 'items', 'movements', 'reports', 'admin'];
  function workspaceTabFromLocation() {

  }
  function canAccessWorkspaceTab(tab) { return tab !== 'admin' || Boolean(state.user && state.user.role === 'ADMIN'); }
  function switchWorkspaceTab(tab, options) {
    options = options || {};
    if (WORKSPACE_TABS.indexOf(tab) === -1 || !canAccessWorkspaceTab(tab)) tab = 'dashboard';
    var focusedPanel = document.activeElement && document.activeElement.closest ? document.activeElement.closest('[data-workspace-panel]') : null;
    var moveFocusToTab = Boolean(focusedPanel && focusedPanel.dataset.workspacePanel !== tab);
    state.activeTab = tab;
    document.querySelectorAll('[data-workspace-panel]').forEach(function (panel) { panel.hidden = panel.dataset.workspacePanel !== tab; });
    document.querySelectorAll('[data-workspace-tab]').forEach(function (button) {
      var active = button.dataset.workspaceTab === tab;
      button.setAttribute('aria-selected', String(active)); button.tabIndex = active ? 0 : -1;
    });
    el('warehouseWorkspace').hidden = tab === 'reports' || tab === 'admin';
    if (options.replace) history.replaceState(null, '', '#' + tab);
    else if (window.location.hash !== '#' + tab) history.pushState(null, '', '#' + tab);
    if (moveFocusToTab) {
      var targetTabButton = document.querySelector('[data-workspace-tab="' + tab + '"]');
      if (targetTabButton) targetTabButton.focus({preventScroll:true});
    }
    if (options.scroll !== false) {
      var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
    }
    if (tab === 'dashboard' && state.stockChart) requestAnimationFrame(function () { state.stockChart.resize(); });
  }
  function handleWorkspaceTabKeydown(event) {
    if (['ArrowRight','ArrowLeft','Home','End'].indexOf(event.key) === -1) return;
    var buttons = Array.prototype.slice.call(document.querySelectorAll('[data-workspace-tab]')).filter(function (button) { return !button.classList.contains('hidden'); });
    var index = buttons.indexOf(event.currentTarget); if (index < 0) return; event.preventDefault();
    if (event.key === 'Home') index = 0;
    else if (event.key === 'End') index = buttons.length - 1;
    else index = (index + (event.key === 'ArrowLeft' ? 1 : -1) + buttons.length) % buttons.length;
    buttons[index].focus(); switchWorkspaceTab(buttons[index].dataset.workspaceTab);
  }

  function releaseManagedModalScroll() {

  function handleManagedModalKeydown(event) {
    var modal = !el('passwordHelpModal').classList.contains('hidden') ? el('passwordHelpModal') : !el('movementCorrectionModal').classList.contains('hidden') ? el('movementCorrectionModal') : !el('itemEditModal').classList.contains('hidden') ? el('itemEditModal') : !el('reportPreviewModal').classList.contains('hidden') ? el('reportPreviewModal') : null;
    if (!modal) return;
    if (event.key === 'Escape') {
      event.preventDefault();
      if (modal.id === 'passwordHelpModal') closePasswordHelp();
      else if (modal.id === 'movementCorrectionModal') closeMovementCorrectionModal();
      else if (modal.id === 'itemEditModal') closeItemEditModal();
      else closeReportPreview();
      return;
    }
    if (event.key !== 'Tab') return;
    var focusable = Array.prototype.slice.call(modal.querySelectorAll('button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),a[href]')).filter(function (node) { return node.offsetParent !== null; });
    if (!focusable.length) return; var first = focusable[0], last = focusable[focusable.length - 1];
    if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
    else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
  }
