  /* Mirrored verbatim from tokens.css. Component rules below consume variables only. */
  :root {

    --color-paper-3: oklch(21% 0.024 248);

    --space-lg: 2rem;

  body {

  button, input, select, textarea { font: inherit; }

  .button--movement-in { border-color: color-mix(in oklch, var(--color-success) 58%, var(--color-rule)); background: color-mix(in oklch, var(--color-success) 12%, var(--color-paper-3)); color: var(--color-success); }

  .inline-alert--error { border-color: color-mix(in oklch, var(--color-danger) 48%, var(--color-rule)); background: color-mix(in oklch, var(--color-danger) 10%, var(--color-paper-2)); color: var(--color-danger); }

  .search-results { position: absolute; inset-block-start: calc(100% + var(--space-2xs)); inset-inline: 0; z-index: var(--z-dropdown); max-height: min(65vh, 30rem); overflow-y: auto; border: var(--rule-hair) solid var(--color-rule); border-radius: var(--radius-card); background: var(--color-paper-2); box-shadow: 0 var(--space-sm) var(--space-lg) color-mix(in oklch, var(--color-paper) 75%, transparent); padding: var(--space-2xs); }
  .search-group + .search-group { margin-block-start: var(--space-2xs); padding-block-start: var(--space-2xs); border-block-start: var(--rule-hair) solid var(--color-rule-2); }
  .search-group__title { padding: var(--space-2xs) var(--space-xs); color: var(--color-muted); font-size: var(--text-xs); font-weight: 700; }
  .search-result { width: 100%; min-height: 2.75rem; display: flex; align-items: center; gap: var(--space-xs); border: 0; border-radius: var(--radius-input); background: transparent; padding: var(--space-2xs) var(--space-xs); text-align: start; }

  .search-result__copy strong, .search-result__copy span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .search-result__copy span { color: var(--color-muted); font-size: var(--text-xs); }

  .topbar-user { display: flex; align-items: center; gap: var(--space-xs); }
  .user-copy { display: grid; text-align: end; }
  .user-copy span { font-size: var(--text-xs); }

  .sidebar {
    grid-area: sidebar;
    position: fixed;
    inset-block: 0;
    inset-inline-start: 0;
    z-index: var(--z-sticky);
    width: 17rem;
    display: flex;
    flex-direction: column;
    border-inline-end: var(--rule-hair) solid var(--color-rule-2);
    background: var(--color-paper-2);
    padding: var(--space-md) var(--space-sm);
  }

  .main-content { grid-area: main; width: 100%; min-width: 0; padding: clamp(var(--space-md), 3vw, var(--space-lg)); }
  .app-view { width: min(100%, 90rem); margin-inline: auto; }
  .view-heading { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--space-sm); margin-block-end: var(--space-lg); }
  .view-heading > div { display: grid; gap: var(--space-3xs); }
  .view-heading > .view-heading__actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: var(--space-xs); }
  .view-heading .muted { max-width: 48rem; }
  .view-heading--dashboard { align-items: flex-start; }
  .dashboard-heading__tools { display: grid; justify-items: end; gap: var(--space-xs); }
  .movement-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: var(--space-xs); }
  .range-control { display: inline-flex; margin: 0; border: var(--rule-hair) solid var(--color-rule-2); border-radius: var(--radius-input); background: var(--color-paper-2); padding: var(--space-3xs); }

  .metric-card,
  .table-frame,

    border-radius: var(--radius-card);

  }
